seq: 4
front:
  text: 迸出紅光鬼神驚避鉛凝汞結爐中養就丹點瓦礫成至寶愚人餐一粒延年紀那堪更有神珠萬顆流霞晃耀遍穿宮裏
  hash: sha256:93199999256f6036f6e64130d82aad7634ff8847c673e3af49143d008e233dfa
body:
  text: 上丹田玄空路玉鎖金闕八卦珠簾庫左有青龍右有白虎碧服胡僧便是三清土虎伏龍龍伏虎戰退三尸贏得河車路意馬心猿牢拴住運上崑崙透入泥丸去中丹田多玄妙聚寶池中五色霞光照姹女嬰兒盡歡笑鍊就金丹價值千千兆服一粒馨香妙換骨抽胎萬病消除了返老還童年又少快樂逍遙倚定岩溪曉下丹田明仙道有箇牛兒不喫尋常草玉液華池滋味好白雪黃芽喂得牛兒飽金龍頭銀纏繳瑩潔無塵遍地如雪罩擺尾搖頭噉聲叫過海穿江直上蓬萊島精氣神須保愛一粒金丹每在街頭賣四十年來無人買閙花叢裏還了鴛鴦債九三爻地天泰離上金烏飛入銀蟾界百尺竿頭做一解這些工夫任使傍人賽嘆人身如傀儡五彩粧成盡是虛瞞昧叉手棚頭談今古相呼相喚空向人前舞出來時如風雨氣斷之時七魄三魂去饒你棚前搥畫鼓喚不回頭終沒回來路夜來忽覩一場希乍見幾箇燈蛾兒堪人嗟呀愛慾貪嗔不肯捨錯認燈光隨高隨下火焰跟前百般顛耍十分燒着全然不怕直待燈盞內做箇焦巴這囘休也休也休也奉勸你諸公畧聽予勸休似燈蛾兒心生愛戀戀着恩愛老了面面皺髮白腰曲頭低耳聾眼暗覓箇回轉把往日風流一刀兩斷聞身康健早做箇惺惺洒洒漢猛跳出凡籠便是一箇了辦北方一日南方一日共東西四方交日夢寐沉沉且往來遊行消日待他年道心開日百年短景都來幾日暗推排今朝明日不覺推排到聖賢佳音來日洞天開是吾歸日山河已定干戈不起太平時八方和氣齋醮頻修盛報答虛空天地謝洪恩暗中慈惠千年一遇神仙出世幸遭逢莫生輕易供養精嚴但一歲勝如一歲遇良辰大家沉醉死生都怕這輪迴販骨如何得罷不悟眞常强生枝節性命了達不下有中不解無中無裏難明眞假離萬法這本來一點何處安劄敢問些兒話修眞養性如何憑執把甚是明心甚爲見性甚是萬緣不掛甚爲明月清風甚是玲瓏脫洒了眞法吿師父慈悲提携點化死生不怕仗剛風一掃般般都罷獨露眞常不生枝節性命亦無高下亦無內外其中就裏元無眞假明萬法這眞如一點不須安劄悟得無生話無作無爲大道無執把六二明心時時見性只此萬緣不掛處處明月清風端的玲瓏脫洒了眞法眞空自在不生不化大道無形方寸何憑在人人智見高明能降衆欲解斷羣情作鬧中之閑忙中靜濁中清情態如嬰懷抱如冰自朦朧覺破前程吾言致祝君耳深聽下十分功十分志十分誠情慾消忘脫了根塵樂虚恬杰淡崇眞形如野鶴性似孤雲到處爲家風爲伴月爲鄰住世無心異俗超羣握玄機哩囉哩㖮省一點顏貌常新得至眞功全眞行侍眞君坐後談禪說道起後不依些少心口自尋思好呆癡日用機關千萬何曾滅了一件欲望做神仙好難天學道須憑一志無志難逃生死對境志如山自然安萬法不離清淨性定方能得命會得這玄空道必通浮生碌碌盡飄流世慾空恁苦爭活計被情愛海沒夢中競利祿謾儔機狡縱有百般榮貴誰念光陰迅速世事促促莫勞心役役棄塵早歸林下蓋箇低低茅屋映窗疎竹洒洒風生玉萬疊青山爲友那管桑田翻覆西風吹渭水落葉滿長安忙忙塵世裏獨自清閑自然爐鼎虎繞與龍蟠九轉丹砂就一粒刀圭餌爲陸地神仙便萬釘寶帶貂蟬富貴欲薰天黃糧猶未熟夢驚殘是非海裏眞道立身難拂袖江南去白蘋紅蓼再遊湓浦廬山不如歸去作箇清閑漢著甚來由惹别人三長兩短天公許大何處不容身且謾着有生涯試待尋思看鑑湖裏面淺山林畔住箇小庵兒且隨分麤衣淡飯嘲風詠月蕭散過平生塵世事盡如麻我也誰能管修竹間青松翠影重重道家樓閣白雲中隔岸紅塵飛不到水浸寒空此景與誰同洞口仙翁素琴彈罷倒金鍾笑傲煙霞無一事明月清風一箇主人翁住在靈宮無形無影亦無蹤鐵眼銅晴觀不見體似虛空出入不通風天地難籠被吾擒在藥爐中運起周天三昧火煅鍊眞容我有屋三間住在深山四無墻壁海遮欄萬象森羅爲斗拱瓦是青天不漏數十年也是前緣一朝功行滿三千降得活龍伏得虎方表神仙忙裏偷閑鬧中取靜利名休競有限光陰無涯塵事貪愛何時盡無情烏兔催人早老暗裏換了緑鬢此形骸假合幻化算來有甚憑準隨緣度日和光同塵惹甚閑愁閑悶富貴由天榮華是命休更勞方寸心中無事眼前清淨俱是快活時景你若待般般稱意耐心且等錦堂春璚仙朝列璚筵遇良辰名香共爇吐氤氲瑞藹祥煙慶三眞重陽五祖願當今聖主遐延昔有軒轅駕龍騰飛上朝玉帝自爭先恁時萬聖齊會宴賞共留連簫詔美金童捧盞玉女傳宣觀神宮仙苑異景降鸞鳳鶴舞翩翩仙童報蟠桃正結丹桂初圓萬載金龜千秋玉兔老人星見慶這些事洞天佳景還也勝塵緣無來去天地同壽日月齊年一領布袍一床紙被葫蘆拄杖爲行李三盃兩盞樂天眞誰能與你爭閑氣滿眼蒼生爭名奪利朝朝只要巴家計教他喫箇土饅頭方知裏面滋味雨過山花綻霧歛雲收天漢清閑幽雅處遊翫古洞巖前時把金丹鍊不愛乘肥馬富貴榮華是非都不管獨坐茅齋看古傳把道經時轉橫琴膝上撫鶴來見紫綬金章是則是官高顯五更忙上馬爭如我仙家日午柴門猶掩草堂三鼓夢遊仙到蓬壺閬苑正白雲滿地無人掃信幽圃香風旋羣眞朝列黃金殿醉流霞璚宴頓覺來一片清凉意似明月山頭見終日駕鹽車鞭棒時時打自數精神久屈沉如病馬怎得優游也伯樂祖師來見後頻嗟呀巧計多方贖了身得志馬須報師恩也猛悟百年彈指淚似迸珠不止急解死生憂管甚石中火起石中火起一任停喪在地學道非難非易怎敢已而不已專下死工夫悟得長生活計長生活計收拾精光神氣布袍草履厯天涯朝市與雲霞隨分有些活計杖挑周易南華客來問我浮世事無言指落華鍊就水雲情性腳踏到處爲家粗布寬衣下領袍一襟瀟灑兩袖飄飄水雲活計伴漁樵過得今宵莫問來朝九節蒼龍仗一條仙經數卷肩上橫挑腰間懸箇小丹瓢行也逍遙坐也逍遙本來無說本無言澄寂湛然湛然常寂炁神全希內自觀玄玄中妙妙中玄無相貌莫團圓往來去怎遮攔清風明月前人命無常看青雲雨過山水韶華盡過了百年如夢有似希夷忘情絶愛念好把意馬心猿牢繫綿綿密密有似出息常不保入息十年一似修眞理做神仙萬無一失門生莫生疑若有纖毫虛謬馬風罰作陰山爲鬼心行常不昧遍十方觀照天地累成功行自有金童來認你我已叮嚀勸展手心休倦後巷前街茶坊酒肆且遍繞巡門散喏好降心與修行方便一志休回轉趁了今生願神氣沖和陰陽昇降虎龍爭鬭迸金燦爛繞丹田看眞人出現天地初分何處寄父母無生名甚字須將這箇要分明推窮此理甯論是細細傳不二亦能整究從前事往來頻不知迷迷甚日得言賜忽爾眞靈前面至認得無形觀喜示惺惺覷着甚端嚴輝輝返照通容易見時惟覓妙玄微雅深中透出圓光五般顏采復本總祥瑞眞清眞靜便是虎和龍澄澄湛湛嬰兒姹女自昇騰寂默刀圭根本齋戒換西東時中十二常常覺照內調神氣玉爐功何須尋枝摘葉豈論語丹經假餘玄妙知懶墮亦成空滅睡忘言除慾飲膳少豐融外係疏嗇人情薄淡念頭打破漸幽通滿酌開懷酒算人生不如意事十常八九造化小兒眞厮戲到了翻前覆後謾只向塵中奔走多滿時賢口人生百歲七十稀少更除十年孩童小又十年昏老都五十載一半被睡魔分了那二十五載之中甯無些箇煩惱子細思量好追歡及早遇酒追朋笑傲玉山摧倒沉醉且沉醉人生似露垂芳草幸新來有酒如澠結千秋歌笑有限形軀無涯火院刹那催促光陰想人生有似當風燭整日家晝忙夜驚有等愚迷千思萬想家緣逼迫渾沉愛子憐妻被冤家繫纜縈身猛悟迴頭名韁割斷恩山推倒重重將愛海跳出清閑樂道逍遙半張紙一張琴土榻安眠牢拴意馬莫教鬭亂身心慧劍揮時斬群魔萬神自甯二炁相交龍奔虎走金烏玉兔相迎入玉爐金鼎丹砂煉陽神出朝玉京此箇家風冰清玉潔點頭多謝知音欲要成雙全後價值千金非僧非俗亦非仙茅屋兩三椽白石與清泉更誰問桃源洞天一爐寶篆一甌春雪澆灌淨三田杰閑想谷神篇不覺松枝月圓光陰迅速不停留春去又還秋展破皺眉頭且唱和仙歌散憂百年短景爭名競利圖恁惹閑愁休恁苦貪求但得過隨緣便休百年勳業鏡中看嘆行路古來難風雨換朱顏更誰管安仁鬢斑掀天聲價凌雲氣勢短夢破槐安回首問青山放一片孤雲自閑無爲大道人難曉只爲工夫少猛悟迴光常返照三田之內六府之中塵垢頻頻掃諸緣斷處清懷抱一點虛靈自耀認得玄元清靜道百關調暢一性圓明得出遊仙島一從東别長安道西住蟠溪廟漸扣南山雲寂渺茅庵冷淡土龕瀟灑官府何曾到夜深陌上行人悄忽聽巖前子規呌聲聲相勸不如歸去爭奈工夫少草堂初寐青衣扃戸丹頂歸巢抱瑤琴高枕夢遊仙島待閑訪三茅中宵睡覺聲如鳴珮竹被風敲隔疏林斜望斷雲飛正月上松梢一生懞懂世事不曉喫茶飯不知飢飽坐處生根立一似頑石當道任傍人笑我虛矯文藝不解豈知典教說修行無分剖面上塵埃髮髼鬆身披衲襖永長生浩劫不老欲識還丹認取自家宗祖便不計當初來處是誰人椿胎骨誰人捏塑捉住這一靈性元來是鉛結聚旣已爲人要了自家龍虎便不會卻擒捉住把金丹一粒吞來入腹恁時免得輪迴受苦物物般般都放下熟境目然休忙裏偷閑鬧處收不挂一絲頭動靜不拘無動靜法界莫能歸境邱逍遙物外遊性似水晶毬一片頑心要似飛引入千古不思歸幸遇明師因曉了肯教熟境再相隨你待東時我卻西我今省悟卽從伊萬劫輪迴皆爲汝百般魔障更因誰小張歌也好把繁華勘破速認元初眞面目把意馬心猿牢鎻百歲光陰能有幾也不可虛過耳卻聽囑付仙風道骨莫向紅塵埋墮省呵把師父親言記着你原是蓬萊洞裏仙爲思凡人間淪落速整仙胎歸上會莫荏苒俗情繫縛自思忖假饒積玉堆金終久幻化如何我笑迷人不信乖劣癡心戀貪名利縈繫落魄狂遊每將術藝養道用安身己道知和息藜杖藥瓢蓑衣蠻笠縱大地有滿地珍珠那的直甚閑氣無限峰巒聳翠略撰箇茅庵用做棲心幸有靈苗裔更兼泉水飢渴自然無礙獨坐深山裏悶看乾坤間隔望落落如曉星之勢再遇何年駕雲朝上帝捉住玉山赤鳳神舟同泛激浪漂浮便使烏龜開口出頭喜謨吸洪濤枯乾北海使巨波澆灌西湖自舒敷水紋花面皆是金鋪光珠盈盈照耀恰如明月晃晃方隅普徧騰輝盡成霞彩環環紆見圓珠深深漸見結寶丹空外超踰得臨途大羅天上永永惺甦這消息幾人知獨我全眞好大悟來心地清凉便分曉本來面目常照最玄妙金關開玉戸閉來往通關竅遍三田覺上下和沖降銀雪黃芽遍生芝草姹嬰舞跳透引動龍吟虎嘯般運在斡旋中坎離顛倒龜蛇戰鬭水火抽添爐內燒丹結就明珠晃耀玉皇深恩宣詔祥雲攢罩恁時穩跨青鸞歸蓬島行道要心堅密護丹田調和眞息永綿綿十二時中常若見休要塵牽訣要避諠譁靜處安然須通語默默言傳神秀丹成行滿得去朝元小小瓢兒生得天然詫身矬矮瓢兒元有口難開解認得乾坤此理誰能解腰間帶道人偏愛不換金魚袋堪嗟人人波波劫劫貪名利何時已眼光落地到此纔方悔雖有兒孫要替應難替思下淚這場滋味認着心先碎昨夜醺醺醉中似覺乘丹鳳笙歌共四天飛縱悟入桃源洞

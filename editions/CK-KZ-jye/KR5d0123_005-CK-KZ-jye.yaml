seq: 5
front:
  text: 正向深溪閑把明珠弄晨動一聲風送驚斷遊仙夢
  hash: sha256:bfc89c631f5fdcc68ace77920a5315d88058c3ec6fe0f7df1aa2d3d009c35365
body:
  text: 四大元無我五藴本來空休爭人與我逞英雄貴賤賢愚到了夢魂中百年親眷屬電裏紅光早宜各自牢籠勸君勤修煉常照主人公來時無一物去時空人生有限貪愛轉無窮不如隨分過一點靈光自然明月清風人生七十古來稀嘆愚迷不修持光陰有限成敗是和非蓋世功名都占取空贏得業相隨暫時花酒氣財迷得便宜落便宜暗裏朱顏漸改氣神虧陽少陰多染患命盡也更推誰如何是道這一點古今尋求顛倒人人有分箇箇不虧少皆因動念錯染着處便生煩惱若也般般放下有何微奧隨分隨緣且過究本來面目直須分曉寒爐冷竈對虎龍吟嘯目前便是了更不向外邊尋討不問神仙與佛共同覺照行不勞坐不倦任行任坐隨吾便曉風輕暮天晴逍遙大道南溪上下平溪東幸獲忘形友耨皎月時斟消夜酒盃停月華清披襟散髮欣欣唱道情緊鎖心猿悟光陰塵世百年遄速下手頓修元本眞靈此日要住行屋居家坑塹先須跳將身已使令孤宿靜無觸氣財色酒一齊須逐俗景般般絶慾更捨盡爺娘共妻骨肉自在逍遙落魄清閑認取裏頭金玉璚英經蘂花心動放香味滿空馥郁異光簇祥光燦爛結成仙曲坎離震兌并子午須識取自家宗祖地雷響震動山頭雨漸澆灌黃芽出土捉得金晶牢閉固煉甲庚要降龍虎有人問道阿誰傳但說道先生姓吕春煙淡蕩青山媚行雲亂飄空界花光石潤秀出洞天奇怪戸牖平高萬丈盡耳目臨風一快多生浩劫塵情曠朗渾無仙界堪愛逍遙自在疏枷鎖抛離業根冤債風鄰月伴道合水晶天籟無限崢嶸勝景盡賜與山堂教賣千乘寶珠酬價問君誰解古往今來多憂少喜淳化太平難值幸逢聖賢出世布道德談羅天地上界眞人權下世御萬國不勞神器中外偃武修文敬賢尚德致清平瑞何以上答天恩佳時念因循等閑虛費要先崇儉約務飽暖不貪名利向玄門求奧祕戒嗜慾保安和氣更心上物物頭頭放下乃得免人間累本輕清體妙湛然獨與天遊爲透入凡胎五行圈圚四大拘囚窮年執迷不悟認聲色虛幻故延留元舊仙鄕道域咫尺天地迢遙欲求返本還元誠只在自心頭但默默精思時時探索必取功收虛空忽然粉碎盡來生業障一齊休振袂蓬萊閬苑不愁弱水無舟醉時節就把青山靠醒來時興取瑤琴操操的是鶴鳴九臯水色清山色近迥然閒自樂俺也一如歸閬苑登蓬島且恁底寄跡人間與造化同遊太虛保養得形神俱妙這無常兩箇字最難防要來時無處潛藏不論老幼不管貧富與賢良不管妻子與兒郎怎戀爺娘身居土血逐水氣隨風魂魄遊颺細看來怎不情傷休貪火院早早修取上天堂三千功滿赴蓬島永在仙鄕引清風邀明月去來兮省多少閑是閑非臨山近水近些松竹向些梅小院活計沒多般詩酒琴棋無縈繫無煩惱無别離待改變一味愚癡蠅頭蝸角得失何所更何爲不如聞早樂眞機高卧雲梯日月循環無定止春去秋來多少榮枯事五帝三皇千百禩一興一廢常如此死去生來生復死輪迴變化何時已不到無心休歇地不能清靜超於彼緑暗紅稀春已暮燕子銜泥飛入垂楊處柳絮欲停風不住杜鵑聲裏山無數竹杖芒鞋無定據好的林泉信腳隨征馭𢬵卻此心生幾許一川風月那爲主西轉金烏朝玉帝東望銀蟾皓色籠青桂漸扣南華排菊會滿斟北海醺醺醉醉倒終南山色裏山色清高夜色無雲蔽一鳥不鳴風又細月明如晝天如水孤僻巉巖清淨界鑿玉安身抱道忘知解道友相看唯莫恠貧寒守拙無相待富貴功名堪倚賴多是多非漸歛多成敗肉食馨香終不耐簞瓢寂淡常安泰得好休來休便是贏取逍遙免把身心使多少聰明英烈士忙忙虛負平生志造物推移無定止昨日歌歡今日愁還至今日不知明日事區區着甚勞神思今日思量當日故知我前程迢遞時難度福又不延天不助匆匆要去無門路走骨行尸今已悟魂夢悠悠且向磻溪住奉謝街坊豪傑戸時時念我頻相顧一箇蒼蠅飛入腥盆顧甜時直入中心去忘了抬身沾其足沾其翅喪其形我好嗟吁怎不動心甜中有苦福內灾生旣知滋味便好抽身你好不惺惺不伶俐一箇大蒼蠅重陽飲水知多少因此通玄妙布麻衲襖布青巾好模好樣眞箇好精神不須鏡子前來照萬事心頭了夢中識破夢中身便是逍遙達彼岸頭人涉厯名山巖巒盡皆遊過上高坡登峻嶺勞神怎麽道在身心着物交加相趓終不失本來這箇白日同行晚來同眠同卧到天明相逐定同行共坐驀然地忽然間分明識破元來是大哥握固披衣候水火頻交媾萬道霞光海底生一幢三關透仙樂頻頻奏常飲醍醐酒妙藥都來頃刻間九轉金丹就要離生滅把舊習般般從頭磨徹愛慾千重身心百鍊鍊出寸心如鐵放交六神和暢不動三尸顛蹶事猛烈仗虛空一片無情分别關結除縲紲方遇至人金口傳微訣頓覺靈風吹開魔障形似木雕泥捏旣得性珠天寶勘破春花秋月恁時節鬼難呼唯有神仙提挈厭離塵垢便志樂虛閑清淨爲友劍掛寒光兵安雲將戰勝五行之寇收得洞玄靈寶跳出陰陽之殼大丹就鍊摘騎日月摩挲星斗英秀超前後隨應萬機明顯神通手鐵板門庭金針玉線到處七穿八透引出錦麒獅子振水禽山獸速囘首向碧霞堆裏高眠清晝莫尋玄妙我分明說破修行關竅戰睡敵魔忘情絕念此是聖賢正教飲食則定除疑每日勤修覺照莫差了待無眠無睡心方合道别有玄和妙鍊氣成神自有金光罩五氣朝元三花聚頂水火運行顛倒九陽結就還丹射透靈臺八表功行了向長生路上閑遊三島欲調眞息論根源參到生前實際氣是心兮神爲氣主心動神氣分離心甯子母相抱意定自成眞液莫錯識這內調息非干扭捏不曉胎元理開目和鼻指靈龜蛇戲祖道家風迴光返照呼吸自歸根蔕清風瞥然透戸水火刹那旣濟至此理要眞常咫尺三生佛出世返觀塵世便擺脫羈縻逍遙能幾短褐綸巾斑笻焦尾便是自家歸計箇人問爲何隱遙指松蘿蒼翠碧霞裏有洞庭猿鶴交朋知己無比清閑貴高枕老莊不尚公侯位水袴山鞋煙蓑月笛别是一般風味安得這些消息自古神仙綱紀遂吾志任桑田改變浮生興廢萬緣多暇便杖屨閑遊田園鄰舍雨笠風巾鶉衣鶴骨韜晦翠微峯下眼底世情群擾方外天機獨霸德風化樂清虛恬淡無爲華夏幽雅雲鶴駕歸去故園鶯燕吟王謝水石清華巖壑深遠高邁軟紅車馬千古是非成敗一枕煙霞溪野妙哉也這生涯欲賣誰能酬價利名抛卻入廣莫鄉閭委蛇盤礴水曲山隈煙村雲屋隨分葛衣藜藿任他玉堂軒冕爭似茅廬邱壑志寥廓向東籬消遣西園吟酌綿邈無爲作不遇箇人何處談玄略書笈琴囊石壇瓦鼎此外並無眞樂幽雅澹然風範端的憑誰光爍自消索有一溪松月千年猿鶴頓消緣慮覺夢蝶勞生鶉居蓬戸飯蟻醯雞塵衫風帽贏得百年虛度利如斷霞殘照名若落花飛絮豈堅固似風中秉燭枝頭垂露誰悟獨歸去收拾水雲高卧曹溪路竹外流泉籬邊叢菊粧點野棠閑趣五柳檻前吟醉一笑人間今古欲分付歎煙波渺渺知音何處玉爐百和發虔心信香一炷氤氲繚繞來往盤旋結成華蓋報天地恩覆載報日月照臨之德報國王水土豐榮快樂報父母恩憐愛上謝祖師聖教丹陽師父傳派紅塵普度全眞大教邱王長在太古居甯海共三人暗合法界願皇王萬歲千秋臣宰請門人拜算來浮世忙忙競爭嗜慾閑煩惱六朝五霸三分七國東征西討武畧今何在空悽愴野花芳草嘆深謀遠慮雄心壯氣無光彩盡灰槁厯遍長安古道問郊墟百年遺老唐朝漢苑秦宮周墻明明芳草見故址留連故人消散莫通音耗念朝生暮死天長地久是誰能保夜晴寥廓初寒淡天瑩徹瑠璃翠無陰樹下長安樓上月明風細百禍潛消萬家同賞一般清味見金星朗朗銀河耿耿交光粲滿天地流轉碧空如水任縱橫畧無凝滯衝山拍海傾光騰秀綿綿吐瑞達了從兹寶瓶堅固玉漿時泥把衷情欲訴何人會得且陶陶醉昊天空闊初晴氣迴觀物工欣欣茂亭臺俯仰山川高下裝成錦繡碧洞清泉響聞迢遞一聲長溜更時時注目悠悠遠看青峯上白雲凑無限靈禽異獸慰悶心不辭柴瘦含風翠栢雙崖爭長千株競秀耀日丹臺四時爲伴百年隨壽任寒來暑往星移物換得高眠白晝混元南嶽初開瑞雲透出崑崙表星移電轉陰昇陽降紅光縹緲鶴舞鸞翔看烏龜共赤龍蟠繞盡鴻濛一氣烹成造化神仙道片時了雲散十方三島洞天深月明風裊此時占得長生門戸遐齡體調吟詠從他海變山移石枯松老伴煙霞獨向是非境外卻恨知音少本自出家離塵世更不貪人間華麗蓬頭垢面終朝獨坐內修活計古廟窑龕裏任他紅輪西墜向無中認有知白守黑綿綿地默調息心上别無縈繫有腋袋拄杖相隨草鞋短襦精膁赤腿羊皮遮體飢後巡門乞飽來唱哩㖮囉哩任傍人笑我呆癡懶漢有誰人識百年如夢蝶嘆古往今來多少豪傑圖王霸業謾得漁樵一場閑說秦宮漢闕今只有狐蹤兔穴想榮華秉燭當風富貴似湯澆雪省也損身薄利害己虛名卻如吳越隨緣養拙柴門掩是非絶向午窗容膝小溪垂釣坐對雲山萬疊夜橫琴伴我知音碧天皓月木馬嘶風我之不然石人點頭啞子會言碧眼胡僧沒手指天畫一圈無所傳任意咆哮如瓶瀉泉枉費工夫去磨砌磚安用機關奪勝爭先戈甲俱甯太平四邊不參禪不問仙一味醍醐我知自然不移一步到西天木人把住鐵牛便牽火裏生蓮玄之又玄雲霧歛月正圓石女停機金針線穿謝三郎許我釣魚船帶甲金鱗紅錦更鮮不出波瀾浮沉自然自喜歡便忘筌這些消息誰敢亂傳夢遊仙分明曾過九重天浩氣清英素雲縹緲貫無邊森然似朝元金童玉女下傳宣當時萬聖齊會大光明罩紫金蓮羣仙謠唱諸天歡樂盡皆得意忘言流霞泛飲蟠桃賜宴次第留連皆秉道德威權神通自在劫劫未能遷冲虛妙昊天罔極象帝之先透重玄命駕恍惚神遊擲火萬里迴旋四維上下八表縱橫鸞鶴不用揮鞭應念隨時到了無障礙自有根源看盡清都絳闕邁瀛洲紫府筆難傳瑤臺閬苑花前瑞雲晻映百和香風散四時不夜長春煖處處覺閑想因緣是一點功圓混太虛浩劫永綿綿任閻浮地山摧洞府海變桑田話衷腸悟南柯一夢黃糧破繁華雲龕布素認宗派返照迴光憑慧劍揮開愛網橫藜杖擊碎塵寰那裏相逢峨嵋山下韜光速迸東華山旁林泉隱南辰北斗日月袖中藏朱顏久天崩地塌眞性如常舞袍袖乾坤恨窄但展手天地平量醉醄醄囊盛四海笑盈盈腹注三江幾度瑤池龍華會上諸仙筵宴捧霞觴鍾離至玉皇御宴無我不成行重陽會金蓮七朵齊放神光其二活骷髏算來有甚風流著衣衫遮形蓋體弄精神虛度春秋又不念無常近也又不怕閻老來勾巧使機關張羅活計忙忙劫劫苦貪求空熱鬧虛名薄利分外惹閑愁三寸氣一朝斷了獨卧荒邱嘆古今幾番成敗光陰迅速難留好翛閑修眞養性把從前伎倆都休放下塵勞悟明心地凌風飄蕩野雲收江山靜太虛空廓星月照瀛洲眞箇好逍遙快樂不羨王侯其三睡魔王百般作害爲殃白日間猶教可夜更深無處潛藏惱得人昏如癡醉壞修行輕送無常眼若膠粘頭如山壓一團昏悶轉羸尫相勾引三尸六賊夢裏盜元陽般般有飛騰法界萬種顛狂似這般無端乖劣勸諸公各自隄防念死生前程事大要殷勤保護三光莫得偎傭全憑覺悟神通勇猛賽關張相爭戰威鋒剛硬一志向前當追趕退雲收霧歛湛湛清凉專燒誓狀謹發盟言遵依國法爲先但見男兒女子父母如然永除氣財酒色棄榮華戒斷腥羶常清淨更謙和恭敬無黨無偏布素婪躭度日飢寒展手街前不得貪財狂語詐作高賢常懷愼終如始遇危難轉要心堅如退道願分屍萬段永墮黃泉修行之士不住居山休勞循環𨈊跧何必區區來往遠遠相參不在持功打坐更不須耕種艱難休勞苦不須藥術博換衣餐看你留心何處但無些染著打破般般好向廛中展手乞覓

canonical_identifier: bkk:krp/KR5d0123/CK-KZ-jye/v1/juan/7
seq: 7
front:
  text: 破形骸假合尋得箇出世仙方思量後回心向道要認箇法中王時時常見面同行同坐同飲霞漿同伴清風明月同一志同見天光同相會同師訪道同唱滿庭芳
  hash: sha256:d7770dd8312292cd048d6768c2daef37adfca1535d112eb1cdaa2877ab7c8e86
body:
  text: 消磨不盡愛山心夢繞寒林幾時端的歸巖穴結蒲團滿地松陰野鶴共人作伴山猿與我知音一丸妙藥一張琴萬慮沉沉回頭冷笑紅塵客共誰爭買世黃金不念朱顏暗謝那知白髮來侵北邙山下草莘莘朽骨縱橫斷碑顛倒無人識任黃牛白犢來耕管甚秦朝將相那知漢代公卿爭如歸去伴雲行學取長生清溪道士眞吾友採松花相配芝英但得壺中日月不求紙上功名征南都護馬如龍臂托雕弓金章紫綬歸來晚被人呼白髮衰翁過眼一場短夢轉頭萬事俱空急㩦鴉钁上雲峯獨倚長松無窮眼界詩千首更何人伴我疎慵夜永三杯濁酒晩涼一枕清風九還七返用工夫煅煉紅爐金丹熟也光千丈彩雲籠一顆玄珠月裏捉來玉兔日中喚起金烏青童持下紫鸞書邀入蓬壺十洲爛賞春難老醉蟠桃香滿清都白髮千年返黑蒼顏曠劫猶朱人間富貴總骷髏水上浮漚隋唐晉宋齊梁夢到如今寂寞荒邱院外黃花翠竹水邊白鳥悲秋休休歸去便休休展放眉頭白雲深處宜高卧學山東譚馬邱劉七朵金蓮秀麗萬枝玉蘂風流一條藜杖任蹉跎布袖長拖是非名利何曾問入終南踏遍煙蘿午飯兩巖翠栢秋衣一沼青荷白雲深處紫芝歌冷笑呵呵長安道上縈縈客謾勞神夢入南柯雖有雙輪似錦誰知兩鬢成皤北窗風度碧琅玕午夢驚殘山泉落石清無價况樓臺半入雲間千卷詩書汗漫一爐香火幽閑萬緣除盡覺心安自返童顏壺中一點眞消息更何人敢叩玄關多謝千年老鶴默傳九轉神丹面如生鐵骨如柴心似寒灰道情不與人情合又誰能送往迎來夜聽泉聲滴瀝曉看山色崔嵬一聲長嘯冷雲堆老鶴徘徊清名莫向皇都說恐妨人高卧天台準備扁舟短棹安排竹笠芒鞋旋栽瘦竹種高松伴我疏慵密陰滿地蒼苔冷坐來撫三尺焦桐洞裏翛翛爽氣林間颯颯清風長安冠蓋老英雄奔走途窮區區千里紅塵裏髮如絲有甚成功爭似道人活計鍊成九轉丹紅秋高親手斲黃精漸覺身經十年舊病消磨盡但逢人莫話長生多謝騎牛道士夜來贈我芝英學仙須學做天仙修煉金丹性命全全羲皇畫卦先先天炁明師的訣傳金丹大藥不難求家家有種自可修修休離丹竈頭無中有坎離顛倒收金丹妙道大神功降收白虎攝赤龍龍烹煎玉鼎中須臾用陰陽造化工黍珠餌罷罷雍雍精調火候十月功功胎仙靈變通嬰兒踴萬眞朝絳宮慧光明徹本來宗無邊法界一性通通禪心空不空如來共老君儒化同修眞祖性復全眞自在逍遙物外人人無貪無恚嗔長生事杏花枝上春善功八百行三千四海遨遊度有緣緣九重丹詔宣乘鸞鶴班行列御前見聞知覺總休題悟得眞空及第歸歸勘破造化機非難易永劫天地齊天機泄漏勉諸公不是尋常乾慧通通掃除皈正宗勤修奉化行仙聖風混元珠無價寶赤水溪邊收拾了色渾渾光皎皎手中握定占斷人間俏沒機關沒做作日月任催催不老逆行船翻撥棹誰知這箇清淨家風好水深清山色好天下是非全不到竹窗幽茅屋小箇中眞樂莫向人間道竹風輕花影重酩酊一甌琴三弄露玄機藏妙用槐壇將相看破浮生夢柳陰邊松影下竪起脊梁諸緣罷鎖心猿擒意馬明月清風共誰說長生話漢鍾離官極品南柯夢斷抛金印草鞋輕藜杖穩笑㩦日月獨步長生境呂洞賓超物外神光照破三千界棄功名同草芥龜毛拄杖一擊乾坤碎混元初張果老白驢踏着虛空倒紫雲生紅霧繞夜來一口吞卻蓬萊島藍采和離世俗手中拍板敲寒玉擺天關搖地軸清風明月獨唱長生曲劉海蟾燕宰相夢回看破空花放别人間離海上紅爐片雪打就黄金像廣成子千二百崆峒高卧寒雲白帝王師天地宅縱橫自在物外無名客范蠡翁曾佐越五湖獨泛扁舟月是非忘名利絶一聲短笛受用蘆花雪張子房扶大漢功名掉去青山伴咽龍肝吞鳳卵金丹養就沒底籃兒滿圃田公列禦寇乘風一撞乾坤透呼南辰喚北斗夢中得鹿覺後還非有朗然子居洛下金蟾飛去皮囊化鬼神驚天地怕本來面目不許丹青畫住華山樂清閑碧洞茅庵胡亂灣日高時造一飡飽來藜杖遶頂遙觀看誰羨他做高官一任穿緋掛緑襴心無憂身自安世間少有這箇奸俏漢世事休甚清幽無管無拘林下叟翠巖前風月友狂歌慅舞爛飲長生酒醉時眠醒扶頭倒在東西不識羞亦無春亦無秋騰騰兀兀且樂延年壽採藥歸白雲飛霧鎖青山仙逕迷黑猿叫青鳥蹄仙鶴前舞引俺歸洞裏到洞中掩柴扉喚得仙童對着棋悶來時飲緑杯草鞋絆倒不脫和衣睡峭壁峯甚希奇檜栢青松四下圍悄無人過客稀寂寥瀟灑冷淡閑活計麵又酸倉陳米木椀缺唇破笊籬又無鹽只有虀甘心守分勝如珍羞味穿草履繫麻絛披片蓑衣掛箇瓢半如漁半如樵髼頭垢面一任傍人笑笑我僑俺知道明月清風爲故交卧白雲吹玉簫這般滋味世上人難曉吾本當初水竹村甘河鎮上便狂風七朵金蓮朶朶新邱劉譚馬郝王孫吾本當初馬半州因與先師說根由獨坐圜墻向內修功成行滿赴瀛洲四大假合本姓譚前緣相遇棄俗緣天下雲遊不住庵功成行滿赴仙壇萊州武觀是吾鄕因遇先生號長生穿街柳巷也無妨不染塵埃性月朗三宣賜紫住天長便是雲光鐵腳王因遇先師赴洛陽功成行滿到仙鄕十九抛家棄俗緣磻溪下志便安然悟得長春不夜天大教門開萬古傳太古今日說因由趙州橋下度春秋唱住橋邊水不流一葉落時天下秋吾本當初本姓孫馬家門下結婚姻因爲先師點破心各自分頭覓主人一更裏調神氣意馬心猿盡拘繫莫放閑遊戲昏昏默默煉胎息開卻天門地戸閉果然通玄理二更裏傳宇宙一點靈光漸通透虎龍初交嚴抵備三尸莫教走慧劍空中報冤讎斬卻群魔首三更裏一陽動金鼎熬煎玉爐烹煉就眞鉛汞匠手鑿開玉蓮蓬兩道霞光照崑頂萬顆珍珠迸四更裏雲收徹海底星龜弄明月處處瓊花結火候抽添按時節子午氤氤降紅屑猛把天機泄五更裏朦朧定心養浩月一輪鏡照破貪嗔病這囘須要鬼神驚只要眞清爲眞靜功滿朝上聖一更裏澄心披襟坐猿馬牢擒鎖慧劍磨六賊三尸盡奔波退羣魔困也和衣卧醒覺朦朧清風送悟入桃源洞閽苑中閑訪三茅興無窮透窗風驚覺遊仙夢二更裏白牛溪邊睡牧童醺醺醉蓑笠堆月下方堪把笛吹樂然歸歸去華胥國得到華胥寬懷抱閑把瑤琴操聲韻高火裏烏龜產白鶴弄雲簫紫霧紅光照三更裏銀漢星移淡出戸將身探月正南二八嬌娥配童男煉三三手把天關撼五明宮裏元辰聚七寶山頭去禱玉虛元始高懸黍米珠演金書國泰民安富四更裏玄圃清風細來往無凝滯解垢衣心月高懸照雲溪上天梯獨折蟾宮桂三界十方惟獨步認得曹溪路一物無眞歡眞樂飲醍醐不須沽高唱無聲曲五更裏架上金雞叫路上行人俏方欲曉沒底籃兒杖頭挑跨風飈同赴蓬萊島此箇家風誰知道得也無衰老琅板敲碧波深處釣鯨鰲出波濤採就長生藥眞汞與眞鉛產在先天與後天大要知時勤採取玄玄得穴何愁不作仙進火要精專審究前弦與後弦屯卦抽添蒙卦止難傳毫髮差殊不結丹兩手擘鴻濛慧劍飛來第一峰外道修羅驚縮項神通造化元來在掌中煅煉玉爐紅橐籥吹噓藉巽風十月脫胎吞入腹坤宮立見三清太上翁温養象周天須要微微火力全愛護嬰兒惟藉母三年運用抽添象缺圓牛斗會河邊捨取玄珠種玉田定意如如行火候精專剖腹分明說與賢生甲更生庚此是丹頭切要明藥嫩採來歸土釜煎烹文武剛柔次第行片餉結丹成沐浴防危更守城到此不須行火候持盈火若加臨必定傾木兔與金雞刑德臨門有偶奇爐內丹砂宜沐浴防危神水溶溶滿玉池年月日并時刻裏工夫一例推着意研窮丹造次毫釐十月殷勤自保持鼎器法乾坤上是天元下地元若也更能顛倒運交番闔闢循環在八門搬運上崑崙龜與蛇兒自吐吞百尺竿頭牢把線掀騰從此元神命永存關鎖自周天昇降循環三寸田不在噓呵并數息天然九轉無虧火力全胎息謾流傳要在陰陽不可偏呼吸吹噓皆賴巽風綿妙在前弦與後弦復卦起潛龍戊己微調未可攻九二見龍臨卦主神通從此爐中次第紅泰卦卻相逢猛火燒乾藉巽風煉就黃芽并白雪奇功還返歸坤道始窮識得水中金煅煉烹煎理更深進退抽添須九轉浮沈温養潛龍復與臨妙運自天心託仗黃婆是丙壬醖就醍醐山頂降頻斟慢撥無絃一曲琴長子到西方少女歸乾變六陽便好下功修二八隄防至九方知道自昌牛斗共商量巧奪天工妙莫揚離坎夫妻交媾後難忘始覺壺中日月長白雪與黃芽兩味晶華共一家摘採辯時衰與旺堪誇火候毫釐不可差頂上結三花駕動羊車與鹿車烏兔往來南北面交加從此天河穩泛槎淨盡露天機只恐時人自執迷頷下藏珠當猛取休遲道在身中更問誰塵網急抛離百歲年華七十稀莫待老來鉛汞少堪悲業報前途難自欺堪嘆羣迷夢空花幾人悟更假饒錦帳銅山朱履玉簪畢竟於身何故未若紅塵外幽隱竹籬蓬戸青松下一曲高歌笑傲年華換今古紫府春光清都雅會時妙有眞趣看自然天樂星樓月殿鸞飛鳳舞白雲深處壺內神仙景誰肯少年迴顧逍遙界獨我歸來復入寥陽去暮鴻嘹唳更晚來地籟陰風齊起造作嚴凝同雲黯黯四海玉龍呈瑞粧點萬家清景普綻瓊花鮮麗最好是命詩朋紙帳圍爐沉醉吟綴搜佳製竹外清香金蕾噴新蘂似糝銀沙或爲粉蝶高下亂飛空裏慶知太平先兆陰陽和矣這玄理遇子猷

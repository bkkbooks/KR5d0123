front:
  text: 同賞江天眞味
  hash: sha256:83b2c2da2a218471b211cdb22cca2bd6d77db7806518884617ad84f1491b0c9f
body:
  text: 内藥還如外藥內通外亦須通丹頭和合類相通温養萬般作用內有天然眞火爐中赫赫長紅外爐增減要勤功妙絶無過眞種此道至神至聖憂君分薄難消調和鉛鼎不終朝早覩玄珠形兆志士若能修煉何拘在市居朝工夫容易藥非遙說破人須失笑白虎首經至寶華池神水眞金故知上善利源深不比尋常藥品若要修成九轉先須煉己持心依時採取定浮沉進火須防危甚七返朱砂返本九還金液還眞休將寅子數坤申但看五行成準本是水銀一味周流經厯諸辰陰陽氣足自然靈出入豈離玄牝若要眞鉛留汞親中不離家臣木金間隔會無因須假黃婆媒娉木性愛金順義金情戀木慈仁相吞相啖卻相親始覺男兒有孕二八誰家姹女三九何處郎君自稱木液與金精遇土方成三姓更假丁公煅煉夫妻始結歡情河車不敢暫留停運入崑崙峯頂牛女情緣道合龜蛇類禀天然蟾烏遇朔合嬋娟二氣相資運轉總是乾坤妙用誰能達此深淵陰陽否隔卽成愆怎得天長地遠雄裏內含雌質負陰抱卻陽精兩般相合藥方成點化魄纖魂勝信道金丹一粒蛇吞立化龍形雞飡亦乃變鸞鵬飛入青陽眞境天地纔經否泰朝昏好識屯蒙輻來凑轂水朝宗妙在抽添運用得一萬般皆畢休分南北西東損之又損愼前功命寶不宜輕弄冬至一陽來復三旬增一陽爻月中復卦朔晨超望罷乾終姤兆日又别爲寒暑陽生復起中宵午時姤象一陰朝煉藥須知昏曉德行修逾八百陰功積滿三千均齊物我與親冤始合神仙志願虎兕刀兵不害無常火宅難牽寶符降後去朝天穩駕鸞車鳳輦不辯五行四象那分朱汞鉛銀修丹火候未曾聞早便稱呼居隱不肯自思己錯更將錯路教人悮他永劫在迷津似恁欺心安忍丹是色身至寶煉成變化無窮更能性上究眞宗决了無生妙用不待他身後世見前立獲神通自從龍女著斯功爾後誰能繼踵兩手擘開混沌坦然眞露丹宗日魂月魄自西東牢捉莫輕放縱外道邪魔縮項相將結寶中宮九還七返片時功皆賴黃婆相送默運乾坤否泰抽添妙在屯蒙起於復卦剝於終温養兩般作用沐浴要防危險吹噓全藉離風工夫還返入坤宮火足不宜輕弄要識眞鉛眞汞都來只一根源烹煎火候妙中玄不是知音難辯採取莫差時日仍分弦後弦前玉爐一霎火燒天無位眞人出現莫問九三二八無過陰偶陽奇大都離坎結夫妻要識屯蒙旣未若過一陽起後便堪進火無遲只因差失在毫釐野戰更宜子細鼎器法天象地坎離運用無差夫妻相會入黃家共說無生妙話雨意雲情了當嶺頭駕動河車搬歸頂上結三花牢閉玉關金鎻撥動頂門關捩自然虎嘯龍吟九還七返義幽深出入不離玄牝運用玉爐火候鼎中煉就眞金强兵戰勝便收心妙在無傷無損一二復臨養火兔雞沐浴潛藏分明變化在中央結就玄珠片餉還返歸根脫體守城抱一隄防黃庭來往是尋常恍惚之中縱放夾脊雙關透頂此爲大道玄門金丹只是此宗根大要知時搬運温養守城野戰華池玉液頻吞玉爐常使火温温採藥審他老嫩調燮火工非小差殊只在毫釐鼎爐汞走黑鉛飛從此恐君喪志須共眞師細論無令妄動輕爲幽微玄妙最深機言語仍須避忌九曲江頭逆浪霎時衝過天心崑崙頂上水澄澄醖就瓊漿自飲便向此時採取河車搬運無停陰陽一炁自浮沉鎖閉玉關牢穩藥產西南坤地金丹只此根宗學人着意細推窮妙絶無過眞種了一萬般皆畢休分南北西東執文泥象豈能通恰似啞人談夢金液還丹大道古人萬劫一傳傾心剖腹露諸篇接引直超道岸莫怪天機泄盡此玄玄外無玄留傳古代與名賢有耳分明覷見食飽傷心損氣睡多夢裏迷眞眼觀心動喪元神耳聽靈臺昧盡要見元初面目慧刀割斷紅塵無情應物本來眞此是修行捷徑頓悟修行道理除情戰睡敵魔不貪名利少風波懶散隨緣且過饑後尋街乞飯飽時信步蹉跎閑來古廟唱哩囉逍遙誰人似我富貴又爭入我貧窮更待如何有緣有分是非多無福無災無禍教他一任奢侈簞瓢也是存活勸君休要苦張羅大限臨頭怎趓一不輕師慢法二誦清淨仙經三存眞氣養神靈四把塵勞拂盡五斷無明業火六除俗裏人情七擒猿馬永安甯八味璚漿得飲箇箇修行人人嚥納誰悟眞道曲徑多歧傍門小法誤了人多少容成豈是神仙究竟採藥謾多爐竈忽一朝脫卻桶底性根壞倒爭如內觀無爲清靜學取本來莊老匹配陰陽抽添鉛汞八卦爲端表人生如夢流年似箭回首也須聞早貪迷戀春花秋月甚時了萬法由心應觀法界一切心造瞿曇同歸去揆不離卽心是道自從識得坎離交際煉藥粗知昏曉看雞飛蟾宮兔走丹闕更無煩惱氣中眞液液中眞氣和合不多不少種得黃芽煉成赤水龍虎交圍繞九還七返工夫到後還我舊時年少待三千功圓行滿恁時是了學道修心存神煉性直要輕舉補腦還精流水不腐戸樞終不蠧日魂月魄搏歸爐鼎眞氣自然留聚把心猿縛繫意馬追囘逈無塵慮定中明有陽龍陰虎水火透時爲度八段奇文千口活法向上有一路呂公高尚不離人世有分也須相遇約十洲三島驂鸞跨鶴大家同去養水養精養神養血先須養氣日月陰陽六爻八卦細看參同契虛軀虛寶千言萬語不過坎離兩字向崑崙頂上返本還元要明終始一身雖小如同天地八萬四千餘里玄牝之門千生萬化都在冲和內此眞眞外别無眞諦方信道一而已異時見鍾呂如有未明請師指示至道不遙只在邇毫釐差失如千里道是難求元卻易如相契一超直入如來地水火交時爲旣濟三尸六賊都迴避只此長生仍久視身口意化成一點沖和氣神是性兮氣是命神不外馳心自定幸有崔公入藥鏡如究竟全眞固蔕歸根靜主客內明方外應靈臺粲發天光瑩兩箇壺中一片景急修省莫待臨渴去掘井精養靈根神守氣天然子母何曾離晝夜六時長在意三田內温温天地中和水十二樓前白雪膩九宮臺畔黃芽遂日月山頭朝上帝神光起騰身直上煙霄外我有光珠無買價光明常照芝田下更無之乎并者也知音寡世間誰是能行者一萬精光神守舍四百四病都齊罷透出火龍歸造化迴仙駕更無一點塵隨馬抱元能守一四大自輕安心中須返照幾曾閑金烏衝耀飛入爛銀盤心心心是道只在心心更於何處求丹又何須衣冕燕處欲超然榮華能有幾日便凋殘修眞甚易積行累功難勸君强爲善五濁三途變爲雲島神山人能常清靜天地悉皆歸一眞含眾妙入希夷昭文不會氣候有成虧妄心寂滅盡困睡飢飡更無作用施爲自然爐鼎就光彩透簾幃玉池神水湧上生肥如魚飲水冷暖自家知自家性命事自家了得自家性命便宜若論修養事知有幾多門諦當歸宿處是虛源至眞至道簡易合乾坤坎離并水火止是筌蹄萃然一點長存箇中如薦得悟了五千言金晶飛肘後透崑崙清江九曲一棹破煙昏水擊三千里九萬鵬程化成元是冥鯤林泉養素拙放落魄慵居世緣絶志如鐵翛然處一味眞懽雜說日逍遙野鶴巖畔爲道侶松軒下沉煙猶未歇夜深獨聽孤猿高峯上叫明月他年功成行滿駕祥雲直至瑤池仙闕箇時節神遊自有鸞鶴迎接舞空碧仙仗飄飄來迎謁桃源會瓊林方信别到此無限逍遙作蓬萊客樂道安貧嘆自古英雄林下無人滿堂金玉謂授兒孫畢竟與屬親問當初無物被貪愛引入迷津早抽身向槐安宮內剛恁勞神朝菌蟪蛄短景又豈信壺中别有長春暫遊萬里少别千年歸去跨鳳驂麟念浮生一瞬幾度見滄海揚塵莫因循彼空華陽艷輕喪天眞若論玄妙聽周風一訣把嬰兒姹女木金間隔從頭分别先擒六賊三尸滅後捉玉兔飲烏血仗劍鋒麾魔障蕩妖邪全憑志猛烈那些箇手段最奇絶龍奔虎走來往放乖劣兩獸擒來吾怎捨爐烹鼎煉無暫歇乾坤至寶陰陽造化斡運龜蛇東雞叫出西江月會入黃庭賞白雪上丹温中丹暖下丹熱三田寶結眾仙舉我赴金闕寥陽勝境教我怎生說五行不到處一氣未生前清光赫赫無何鄕裏獨超然日月豈能照鑑天地不能包裹晃朗妙無邊賴有竹澗水卻向世人傳杳兮冥恍兮惚湛兮然這些消息渾身是口也難詮截斷千差歧路屛除萬般機巧纜住釣魚船往事都休問靜坐一爐煙七返還丹在人先須煉己待時正一陽初動中宵漏永温温鉛鼎光透簾幃造化爭馳虎龍交媾進火工夫牛斗危曲江上見月華瑩靜有箇烏飛當時自飲刀圭又誰信無中養就兒辯水源清濁木金間隔不因師指此事難知道要玄微天機深遠下手速修猶太遲蓬萊路仗三千行滿獨步雲歸水中金衝牛斗玉鎖金關護法靈童守赤水丹基龍虎走萬象森羅勃勃投珠口飲靈液明火候太乙爐開丹熟神光透浮名浮利終不久下手速將窮取無中有修行之士功勤不小識五行逆順顛倒妙理玄玄玉爐中龍蟠虎繞金鼎內煉成至寶陽神離體冥冥杳杳刹那間遊遍三島出入純熟按捺住别尋玄妙合眞空太虛是了想赴蟠桃玳瑁筵休享御酒瓊林宴息爭名奪利心發養性修眞願爭如紙被裹雲眠茶藥倚爐煎看峻嶺銜花鹿使巔峯獻果猿朝元在金闕寥陽殿安然蓬萊洞裏仙麻絛草履風袍袖名利不剛求蓑笠綸竿釣魚鈎緑水東流浪花中一葉扁舟揀溪山好處追遊遣興忘鄕懷醉中問甚春秋學洗耳溪邊許由笑蝴喋夢裏莊周茅舍清幽衲被蒙頭紅日三竿高枕無憂到大來散誕逍遙園林成趣獨木爲橋你便祿重官高是非海萬頃風濤不如俺絶利名麻鞋布襖少憂愁𩮎髻鐶絛興飲濁醪醉赴蟠桃閑步雲山悶訪漁樵人生如落葉辭柯百歲光陰暗裏消磨信蹉跎世人看便似風魔嘆富貴如披麻救火功名似暴虎馮河白甚張羅日月如梭十載生涯一枕南柯子是虛飄飄水上浮漚不如谷口煙霞獨樂深耕爲國求兵笑包胥哭倒秦亭試看青門外鋤瓜邵平東籬下栽菊淵明午醉初醒獨坐茅亭打一會簡子漁鼓誦一篇道德黃庭爲浮生兩鬢白觀鏡裏朱顏邁忙辭了白象簡緊納了金魚帶緑柳倚門栽金菊映籬開愛的是流水清如玉那里想侯門深似海幽哉袖拂白雲外彭澤清閑歸去來光陰似水流日月搬昏晝塵俗一筆勾世事都參透睡來時高枕一無憂悶來時拄杖半過頭飢來時一鉢千家飯閑來時孤身萬里遊盈眸閬苑風光秀擡頭蓬萊景物幽榮華似風內燈富貴如槐安夢恰六朝賀太平十二國干戈動人海混魚龍浮世隱英雄收楚韓元帥興周的姜太公功名到底成何用悉是南柯一夢中爐中煉出靈丹藥雷震採茶苗明月清風杖頭挑不掛椰瓢看看又早中年過白髮鬢邊多積玉堆金大如何夢裏存活把心猿意馬方拴定爲甚不爭名便得象簡金魚做公卿白馬紅纓超凡入聖漢鍾離沉醉誰扶下玉梯扇圈一部胡鬚力絳雲般紅肉皮做伴的是茶藥琴慕棋頭綰著雙髻身穿著百衲衣曾赴閬苑瑤池醉魂别後廣寒宮飛下瑤臺十二峯只因一枕黃粱夢得神仙造化功左右列玉女金童採仙藥千年壽煉丹砂九轉功每日價伏虎降龍西風寬舞緑羅袍每日階前沉醉倒頭邊歪裹烏紗帽金錢手內抛鬭爭奪忙殺兒曹狂歌唱檀板敲子是待要樂樂淘淘不爲賊盜戀妻奴獨向煙霞冷淡居金銀財寶無心顧渾身上破落索繿繿縷縷衣服冷清清爲活路閑逍遙走世途脊梁上背定葫蘆駝腰曲脊六旬高皓首蒼髯年紀老雲遊走遍紅塵道駕白雲驢馱高向趙州城壓倒石橋拄一條斑竹杖穿一領麤布袍也曾醉赴蟠桃玉堂金馬一朝臣翻作崑崙頂上人腰間不掛黃金印閑隨著呂洞賓林泉下養性修眞金牌腰中帶笊籬手內存更不做國戚皇親筆尖吏業不侵奪跳入長生安樂窩皂紬衫身上都穿破鐵拐向手內拖亂哄哄髮似鬆科豈想重裀卧不變皓齒歌每日價散誕蹉跎藥爐經卷作生涯不戀王侯宰相家亂紛紛瑞雪藍關下凍傷韓湘馬半空中亂糝長沙黑騰騰彤雲布冷颼颼風又刮山頂上開花本性好清淨保養心猿定酒又何曾飲色又我罷盡財又我不貪氣又我不競雖見我不觀雖聞我不聽不論他人非只尋自己病遇有不輕狂如無守本分官中不繫名私下憑信行不在人數中免卻心頭悶和光與同塵但把俗情混爲甚不爭名曾共高人論落魄洪杯數十年朝朝恣性日高眠尾閭通透泥丸穴丹竈能分造化權只此雲霄應有路算來我命豈由天莫言大道人難會自是凡夫不學仙南北程遊數十春潛行玄理暗修眞不求世上無窮物只向寰中覓箇人悟得已知消息大內丹常遣泝流津假饒千載重相見也似如今日轉新京洛幽閑清靜中住居古觀古壕東世情亦染心無染塵事須同道不同煉藥豈辭千日苦運精常遣四肢通世間最貴堪珍重除卻人身總是空求仙之日亂紛紛涉厯山川走似雲總學長生尋外物算來至道未嘗聞陽精已失眞和氣金石徒勞客熱薰堪嘆凡夫全不悟盡甘荒野作邱墳休讀九經三史書與身到了不相宜爭如保養元和炁更爲添燒大藥爐存得眞精終濟老煉成金質定冲虛不明有箇長生路其奈凡夫性轉迷求貴貪財無盡時高官極富又何爲爭如權重勞心治未勝身貧得自怡欹枕任從春日永運精不遣鬢毛衰他年物外相逢處自是神仙别有期眞鉛眞汞不難尋自是凡夫錯用心月魄日魂明甚易木精火候理何深辛苦運精須九載變化通靈點五金出世只消飡一粒崑崙蓬島盡知音夾脊雙關至頂門修行徑路此爲根華池玉液須頻咽紫府元君遣上奔常使氣沖關節透自然精滿谷神存一朝得到長生地須感當初指教人天網空籠萬象疏一株松倒華山枯寒雲去後留孤月臘雪來時向太虛石洞龍蛇歸紫府千年鸞鳳落蒼梧自從别卻先生後南北東西少丈夫朗然子齊人也因隨唐玄宗幸蜀遇神仙司馬承禎口訣傳金液還丹大藥訣自後修煉成功卻歸洛陽鄕老傳言朗然子於宋端拱年間醉死於桃花坊時天大雪惟尸卧處周圍

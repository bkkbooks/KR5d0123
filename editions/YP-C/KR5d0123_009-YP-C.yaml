body:
  text: 丈許無一點雪官吏撿尸惟見鼻口耳中有金蟬遞返出入良久飛上空中去衆皆仰視及迴顧卻不見地上尸矣萬靈朝元宮道士趙隱微收得朗然子詩篇化緣立石廣行其傳叩門告余出示此詩余親詳此詩語亦不過運氣吞液保陽去陰與余符契喜爲書之皇統元年三月二日方壺知足居士謹題太空歌馬丹陽道可道非常道如如不動要長保保守寒光射太虛一輪皎潔靈虛曜法可說無法說澄澄湛湛諸緣滅方知無滅亦無生宿債冤家從此絶生箇甚滅箇甚靜靜清清清又靜自從認得恁麽明方知恁地性保命休求眞莫棄假求棄之中生巧詐旣生詐巧棄眞如卻如避刀卻遭剮不曾行不曾看要滅生亡難也難行得一步悟一步不行枉了說長安君未悟莫强誇休說虛空是一家心不了時剛論道猶如瞎漢看璚花這邊好那邊醜引得牛兒曠蕩走若還方寸未明時閉目澄心且合口不用手不用索不須牢拴牢把捉無意牢擒占影風自然動靜雙忘卻不離書不執書雙泯之中內外居離經方法難開口執文昧卻自家珠心爲禪性爲道行行步步爭多少因師一指說根源石人拍手呵呵笑禪爲宗道爲祖打破金木水火土光明相射含眞空卻笑一二三四五宗又通法又通惟憑眞行與眞功功行了兮俱不見惟憑一點照寒空也非道也非禪杳杳冥冥合自然萬事剔開清淨眼赫空朗耀照無邊悟眞歌馮尊師覺中覺了悟中悟一點靈光無遮護放開烈焰照娑婆法界縱橫獨顯露這些消息至幽微木人遙指白雲歸此箇玄關口難說目前見得便忘歸不是葛藤老婆舌端的慈悲眞妙訣一輪明月杖頭挑一爐紅焰盛春雪我本元修大覺仙有緣悟得祖師禪歸來一曲無人應翠竹黃花體自然畫堂一炷沈煙細空嘆文殊問病意曹溪月朗風自清金蓮開遍祇園地橫擔虎杖便歸來雪閉寒山路不開瀟灑此時誰會得知音惟有數枝梅自從認得長安道不愛閑花并野草夜深枝上子規啼壺內樓前春正好到家自在樂無爲觸處頭頭顯聖儀不是大慈千手眼玉人拈出古摩尼將何法寶明此物杳杳冥冥及恍惚眾生不識這如來三世諸佛獅子窟眞閑眞樂向誰誇盡是鶴鷯井底蛙一曲空琴彈罷處青山依舊鎖煙霞證道歌呂洞賓悟眞常不達命此是修行第一病只修眞性不修丹萬劫陰靈難入聖達命基迷祖性恰似鑑容無寶鏡壽同天地丈夫兒把握陰陽爲本柄性命全玄又玄海底洪波度法船生擒活捉蛟龍現始知匠手不虛傳得道歌景陽道難入道難覓說之容易誰能得旁門惑世幾千般得道萬千難選一近有一等學道者不肯低頭眞可惜瞞天瞞地更瞞人未得一時誇了畢要做神仙故不難神仙須是神仙質不是神仙莫亂爲動有陰魔作冤隙這箇事非小術全憑德行施陰騭斷除妄念息貪心行行步步腳根實若明本性與心同方敢與君說端的學金丹容易入熟味中庸與周易有爲有作總皆非說龍話虎終無益元初情動有其身若更迷修轉荆棘常思混沌未分前妙理難言心自然一身上下皆屬陰一物陽精人不識圓陀陀地鎮相隨空不空兮色非色散於萬物遍乾坤一物之中一太極退藏於密一性中視之不見尋不得我丹訣自各别不用日時與年月也無火候與抽添亦無人我分妍拙亦無生亦不滅亦無所修無所說飢來吃飯困來眠閑時打坐懶時歇逢物便飡逢酒飲不持齋戒心常澈榮華富貴不關心名利是非皆斷絶凝然靜定養元神一念不生眞境别自歡悅自歡悅晝夜見箇中秋月不來不往正當中洞然八荒皆皎潔也無盈亦不缺猶如紅爐一片雪雖然得到這工夫打破虛空方了徹逍遙快樂且優游人間煩惱不相涉學道人趁時節百歲光陰如電掣遇之不煉大愚癡莫待老來神氣竭急迴頭當猛烈一刀兩斷須見血欲脫凡身換法身精修一念當如鐵說此言大心切盡把天機都漏泄學人若作等閑聽祗恐臨終悔不迭心地賦三于眞人世事無窮觀來盡空旣向玄門受教便於心地下功大智閑閑澹泊在不生之內眞機默默逍遙於寂滅之中原夫要長靈苗先持心地六根淨而千種滅三界空而百端治見聞知覺是障道之元因恬淡清虛乃頤眞之大義若乃堅成學道須當了心心靜則孤明獨照心存則萬境皆侵眞容無欠亦無餘生前可見幻相有形終有壞分付何求明知諸法皆空萬緣都罷行功打坐乃道之狂布惠施恩卽德之詐大巧若拙還知事事無爲善計非籌直要頭頭放下但使一心不動萬行自全每暢神而度日實知命以樂天任經春夏秋冬飢飡渴飲或對風花雪月穩步安眠若能對境忘情逢場作戲本來了在方寸何必修於累世永嘉旣悟强留一宿而歸盧行猶疑謾等三更而至是知物物皆空塵塵總棄性外更無實相目前盡是虛泡長生有物而混成神鬼莫測大象無形隨處是天地難包信乎本要明心何勞苦志諒不由他誠能自已大辯忘言眞經絶字賴啼鳥宣揚落花指示石女親傳木人舉賜淺智少識者則曰不然不然高明廣見者乃云如是如是故悟則處處平夷迷則頭頭踏刺大抵欲修天外大成功莫掛人間些子事八義禪賦馮尊師教有頓漸禪無後先迷之者遠隔劫外達之者近在目前無去無來運六通而自在不生不滅超三界以孤圓不畏諠譁不居瀟灑門生五派者强生知見宗舉一乘者亦爲虛假只要常常顯露般般放下清風萬道松間石女謳歌明月三竿嶺上牧童顛耍智慧夙禀靈明頓開應機時須宜性現對境處决要心灰圓融四象通達三才緑水長流縱爾漚生漚滅青山不動任他雲去雲來亘古亘今不衰不朽昧之者滯於聲色達之者超於無有驅掃風雲摩挲星斗空琴韻美堂前木馬咆哮雪曲應希海底玉龍奔走莫問東西菩薩休尋南北彌陀觸目盡是法界何方不是禪那會得如此方堪恁麽居塵出塵豈落萬緣之化在慾無慾不沈六賊之魔左右逢原寂照返朴葛藤老婆舌千劫販骨靈源直指者一句絶言縱奪自由殺活獨卓白雲青嶂頭頭盡是眞如翠竹黃花物物無非正覺泯絶無際包含大千拈花示衆者眞爲過計叱佛罵祖者亦是違愆誰會進步蓮花鹿苑歸來月滿江船拈出自己家風頓超十地踏碎頑空夢幻獨翫諸天一等虛脾敢胡鬭觜皆較糟粕者甯知眞味穿鑿公案者豈通妙理差之一毫失之千里木人言若要識西來須吸盡涅槃金仙髓識心識意賦如要修行先須識心識意然後悟性如何是心如何是意但能知覺爲之心千思萬想爲之意意從念起心從物生旣知起生之根源者只在方寸方寸者本來之眞心也心本無心意本無意爲從來熟境難忘心浮意動卻把眞心朦昧不能顯現須是澄心定意內觀其心湛然不動者爲之定定中覺靈者爲之慧定是體慧是用定慧兩全者日月不虧也清閑賦汎愛曰濁孰能好清從他縈其萬慮惟我閑其一生猛離桎梏之囚常居安靜免被蝸蠅之縛大悟靈明原曰絶世羈縻統元綱紀玩杳冥太清則能深根固蒂處恬淡眞閑則樂長生久視旣知此理心如秋水之澄凡動於時妙若春風之起若乃卓爾與立湛兮或存廉而不劌也喻鏡分妍醜光而無私也如月射乾坤端正一性安然六根孤高潔淨於靈源松筠雅操坦蕩縱橫於法界絶素玄門於世身返孤雲情起野鶴體微妙則藏山於澤絶思慮則藏丹於壑清徹靈虛逍遙曠漠絲毫不掛神飛姑射之遊物我俱忘雲步寥天之廓大抵非聖所私由人所爲苟未捐其名利安得悟其希夷述夫大智閑閑覺見南山之語小人戚戚理聞宣父之辭且如在欲行禪擔家說妙須得下愚之敬慕未免賢良之譏誚直須靜裏興功回向閑中返照致虛極而守靜篤老氏家風隳肢體而黜聰明顏淵樞要夫然心法雙泯生死兩捐憑清淨修成道果悟虛閑鑿透玄天從抛有漏之因蕭條宇宙深息無爲之穴嘯傲雲煙异哉飯蟻勞生燈蛾殞命空恁漂沈其苦趣誰肯修完其德性已矣乎不如聞早樂閑清歸去玄都朝上帝全眞賦馮尊師神聖垂御仁慈普均旣宏開於玄教特謹奉於全眞孰知十極之高仙來遊此世大闡三皇之古道順化於人切原德貫諸門心歸一正捨俗者辭親割愛固窮者樂天知命是以全眞學而修性功名財色觀如水上之浮漚智慧靈明敬若教中之先聖誠以學不所執法求大道廣積德行則外施於方便深修保煉則內運於成功善處無爲不二能尋有道參同物物分明瑩若潭中之皎月頭頭應現動如草上之清風必也選甚高低盡皆提挈學之者有因有果達之者無滅無生至靜至和至堅至潔統萬德而接物不捨慈悲宣三教以開迷猶尊賢哲大抵乞食不恥至貧不憂屈己惠人則施恩於孤老高志抗節則笑傲於王侯是謂全眞英士達道仙流頓悟天機高播玄風遊聖境廣施香餌普尋知友赴瀛洲是以見物明心知空悟道全眞道法則謹依於鍾呂取大道玄理則嚴奉於黃老清虛恬淡收紅爐爍就銀絲純粹精微向丹鼎烹成金寶捐彼假合表達自然證實相妙之更妙得眞功全之又全五道銀霞貫斗一輪明月輝天鶴駕金書朝赴九陽之殿蟠桃玉液位登萬聖之筵噫有等愚迷閑爭人我宣揚誦經者豈通玄妙誑惑中下者不知因果須離火院恩山卻入名韁利鎖丕休哉若要知端的全眞頓悟虛無堪可尊道賦宋仁宗三教之內惟道至尊上不朝於天子下不謁於公卿避凡籠而隱跡脫俗網以修眞傲林泉兮絶名絶利樂巖谷兮忘辱忘榮頂星冠而爍日披布褐以長春或髼頭而跣足或丫髻以包巾摘仙花而砌笠折野草以鋪茵吸甘泉而潄齒啖松栢以延齡歌之鼓掌舞罷眠雲伴山谷則盃茶款話逢水飲則尊酒論文笑奢華之濁富樂自在之清貧豈一毫之罣礙無半點之牽縈或三三而參玄訪道或兩兩以話古談今話古談今兮嘆前賢之興廢參玄訪道兮理自己之玄眞任寒暑之更變盡烏兔之逡巡蒼顏返少白髮還青携簞瓢而入鄽化飯採百藥以臨世濟人解安人而利物或起死以迴生修仙者骨之堅秀達道者神之最靈判吉凶斡旋異象定禍福密勘人倫闡道法揚太上之正教施符籙除人世之祅氛降邪魔於掌上布罡氣於雷門扣天閽眞仙具備擊地戸萬神咸聽頤眞默坐靜室存神奪天地之秀氣採日月之華精運陰陽以煉性按水火以胎凝二八陰消兮若恍若惚三九陽長兮如杳如冥應四時而採取養九轉以丹成跨青鸞便衝紫府騎白鶴直謁玉京參滿天之秀氣表妙道之殷勤比儒教兮官高職顯富貴浮雲比釋教兮寂滅爲樂豈脫凡塵朕觀三教惟道至尊祖庭記祖庭昔日本無蹤重陽開化闡玄風故鄕長安京兆府祖居醴泉太子村天垂乾象神仙降地發祥光紫氣昇母懷仙胎經二載生逢時遇宋徽宗政和二年壬辰相臘月二十二日生祖師父母生三子重陽師父有二弟幼小入學明師訓九經聖典若習攻二旬有七應武舉深知兵法挽硬弓文武雙全人皆懼宋號德威名世雄心上所爲明似鏡口中言語響如鐘昔日甘河曾沽酒得遇披氈二仙翁五篇玄秘親傳受七竅通靈便見功自從飲了甘河水心地大開方便通四旬有八逢正教棄世歸道隱墓中得觀內景眞消息方知五行造化功識破幻化虛假體更不人間問吉凶再逢和李居劉蔣三人同居至三冬思想邱劉譚中馬改名自呼王害風火焚茅庵辭秦地别卻東南下山東三千里外得知友九轉成功入南京師召門人親囑付吾當歸去赴蓬瀛大定十年庚寅歲五旬有八壽命終查子店中昇仙路留下全眞古家風七朵金蓮開戸牖長春長教化門宗傳與清和全眞理浩然盤山南離峰洞眞白雲披雲子無欲高中眾仙翁十八大師都在此庚子年間起建功天下門人來助力寰中道者總施功天賜匠人曹提點殿閣建在水竹村嵯峨嶮峻高百尺碧瓦琉璃接太空南山吻獸龍噴水四獸昂昂虎嘯風千梁萬拱排八卦五脊六獸按九宮遠望有如須彌頂遙觀恰似太華峰上接雲橫連北斗下臨九肺九泉通嶺背八水總朝東萬道霞光籠寶閣千條翠霧罩琳宮曾觀鸞鶴空中舞又聞仙樂振天宮萬象森羅朝玉帝諸仙聖眾捧三清紅光紫霞深鎻閉白雲瑞氣緊牢封數株紅桃兼緑竹千根翠栢間青松遊遍乾坤無限地希有重陽萬壽宮昇堂文趙眞人切以玄元聖祖廣開眾妙之門大道全眞普化羣生之教瑤池仙子重陽金蓮七朵閬苑璚宮長春玉花萬葉雖則枝分稍異到了萬葉歸根然則派别流差畢竟百川歸海方方設教會四海之雲朋處處興緣聚三山之霞友茅庵草舍普修寶殿琳宮紙衲麻衣恩賜星冠月帔可謂人能弘道闡先聖之規模自然道法應人開後世之眼目了眞堂上元無一點縈心萬行門頭正好諸人着力在上者當處寬仁在下者常生敬順塵心爭辯不見體玄之家風道眼相從依舊丹陽之活計夙爲物外神仙今作門中法眷莫滯一時之糞土彈輕千聖之寶珠在世時同修道果超凡去共列仙班出家君子清眼研窮離塵烈士赤心照察伏惟珍重其二馮尊師夫至道渺漠妙道希夷先地先天不拘文字光明虛徹遍滿十方清淨靈通周流三界千變萬化統攝陰陽體用眞常無窮極矣爭奈凡籠障重難矣承當賤古尊今妄生知見殢法參禪傍開戸牖從此太極樸散教列三門情識場中不能歸祖觀彼諸人深宜哀愍是以大開方便廣運慈航普濟苦海群生脫免沈痾六趣引歸眞路復翫鴻濛鑿開恬淡門庭遊賞清都降闕五雲臺上明傳黍米玄珠九曜樓邊高舉含光寶劍縱橫曠漠坦蕩無何動止無爲混成純素遂可掃除薩埵遊戲菩提不死不生無餘無欠聖凡俱遣空色包羅假使泥牛吼月木馬嘶風漏透機張作家笑具炎炎言下叱回碧眼胡僧寂寂光中擊碎金毛獅子花收五葉機拂三玄放開元始鉗鎚縮卻牟尼手段發揮象罔踏碎涅槃截斷曹溪閑居鄭圃達磨羅什未生已有南華禦寇奈何學者忘本逐末棄主憐賓不叩冲虛執持梵語本安中國求證西方空費草鞋尋箇甚麽石獅子剜了心肝野狐涎灌徹骨髓在欲行禪望成佛果葛藤謎語敢把人瞞此般君子怎生接引今也聊將法藥擲向人間出此醍醐利兹上士舉揚本分生涯點檢見前面目露些消息分付知音這段家風是何曲調樂非律呂劫外陽春琴操無絃孔吹天籟不須玉線金針繡出霓裳彩鳳箇人會得卽便歸來不夜樓臺同登雅會無底籃兒汲水無根鐵樹開花此箇規模如何印綬渾淪邦畔不許商量靈寶峰前孰能着腳直須洒洒落落休要紛紛紜紜頓悟玄風逍遙宇宙久佇仙班伏惟珍重其三秦眞人百歲光陰疾如流水一生事業空似浮漚昨朝面上桃杏花開今日頭邊雪霜照破蘇相國腰懸六印難免無常郭子儀位至三公終歸大限白蟻陣殘渾似夢子規聲切勸君歸休待禍臨頭方知是幻金玉滿堂怎生守得兒孫對面謾切長吁紅樓翠閣粉墻高非干己事白馬朱輪金鐸響盡屬他人徒勞箇裏傷心不覺暗中彈指鬼使者豈通關節閻老子不順人情淚落千行悔將何及腸分九段更怨他誰到此際多休少休方知道千錯萬錯惆悵落花流水無可奈何凄凉衰草秋風不堪迴顧若夫聰明君子漢慷慨丈夫兒萬事全抛一言猛悟比黃金如糞土要買神仙等白玉似塵埃斡迴天地更不前思後算那復朝商暮量脊骨如鋼腳跟似鐵又何須煉藥煉丹卽歸三島更不假安爐置鼎便到十洲許旌陽拔宅上昇蓋因此耳淮南王全家脫去豈有他哉爭似高人做驚天駭地因緣有躍古騰今手段心和口應口與心同姓名已掛於丹臺功德定歸於紫府若是聖賢妄語可憐辜負善人自慚口拙不敢多言久立仙賓伏惟珍重茶文伏聞一聲雷震吐羣品之芬芳鳳餅龍團表至眞之異物陰陽滋秀天地氤氲禀四時之正氣奪五行之清味先春園內生成片玉之珍瑞雪巖前造化靈芽之蘂玉人採得妙用依時金槽碾處香來撲鼻石鼎烹開璚花浪躍盧仝七椀洗除六慾之昏迷趙老三盃滌盡眾生之夢寐愛之者精神爽異悟之者心地清凉莫言釋子家風眞是道人受用聊得一味普施諸人得意歸來伏惟珍重七眞禪讚并叙披雲眞人全眞之道其來久矣惟曾子固言之甚詳而後學者猶以爲黯闇蓋全也者物物皆全而眞也者念念皆眞物物皆全則無缺不全念念皆眞則無段不眞無物不全是全全也猶未至於所以全也無段不眞是眞眞也猶未至於所以眞也卽全非全卽眞非眞亦無非全亦無非眞學至於此全乎全乎眞乎眞乎萬分未得處一焉故能及山川移城邑蹈水火入金石縱橫自在變化無方者也此教出於太上而傳于東華東華傳于正陽正陽傳于純陽純陽傳于重陽重陽之前玄萌乍發人未之信重陽之後其風大闡者七世矣嗣教東萊披雲子謹齋戒而述七眞讚焉辭曰教祖重陽猛脫金章佩洞賓之祕訣飲甘河之靈漿進上上步入玄玄堂得四友於東海領群仙於上方金蓮開半萬之祖玉葉傳十九之芳一自祖師歸去後終南依舊好風光其二猗歟丹陽三髻作舞密投賜芋之機猛悟分梨之語抛半州之舊產應三清之選舉鑿二炁未分之前運五行不到之所霹靂一聲歸去來呵呵拍手花如雨其三稽首長眞不拘小節膽氣凌秋腳跟似鐵抛俗眷以慷慨入玄門而决烈襲朗然子九轉之機受重陽師四言之訣超出陰陽之陶冶解開造化之關結十年受用洛陽春等閑肯向東風說其四偉矣長生風標秀出厭塵土之腥臊悟宗風之消息遊物外之煙霞跡混鄽中之鼓笛花簪閬苑之紅桃咀蓬壺之碧躍出洪波萬丈高靈光一點無人識其五偉哉長春弱冠高潔孤身度函谷之風七載坐磻溪之月六受皇宣四朝帝闕數十國化行於虛靖三萬里不辭於風雪寶玄臺上夢遊仙露滴松梢還漏泄其六號賜體玄含眞自然字潛分於鑫竹位默定於金蓮六月迎陽而久立三冬抱雪以安眠雞已烹而復唱鴆雖飲而命延受金國之四詔拜玉皇之兩宣試問鐵楂山下月肯將消息向人傳其七太古壯年幸識重陽高出煙霞之外遠抛名利之場甯海市中挽囘日月趙州橋下坐斷冰霜鍊五行而作髓煎八卦以爲糧八十四年還債了東風迴首舊家鄕或曰七眞之道盡於此乎曰未也是猶追騏驥之遺踪拾鳳凰之落羽以爲驥鳳之全體可乎或者笑而稽首惟聖知聖惟眞知眞惟鳳知鳳惟麟知麟惟披雲老仙妙齡入道侍長春者四十餘霜矣得全眞之尤精者也於七眞之顯神藏用飽聞而飫見之吐辭爲讚言言入神事不虛靡文不過華使天下學者讀之足以爲信據而無疑矣逍遥吟處順適逍遙全身遠俗囂狎鷗泳滄渚鼓瑟會漁樵轗軻心無恥尊榮志不高收綸望晚釣信步與春翹完矣豐絺綌沛然澤蓼蕭黃庭消百慮紫芋待終朝於焉開三徑扶搖玩九霄暢情橫短笛握固返垂髫寵賜非憑據清閑足富饒儘他使副墨惟獨貫參寥遂志浴沂水嫌喧棄許瓢虛懷蠲斸斫挫銑混蒭蕘時否潛知止歲寒節不凋九思於節揖五柳任蕭條伉儷或耘耔歸休懶折腰灌畦甘抱甕忘味喜聞韶除害輕金玉聿修光祖祧高奔邁騏驥奮翼笑鷦鷯絶學遊玄圃頌聲歌聖朝觀鵡臨曲沼覆鹿用枯蕉塞兌徒居實深根匪揠苗解紛須侃侃養素樂夭夭塗隙藏深密如愚匿懋昭參禪稽侷僂摳瓦巧靈潮齊物眞何碍封戎世可超悲嗟蝸競角坐看鳥遷喬但看同耕叟焉能屈下僚鳳笙雲外聽春色杖頭挑刻木鳶誰放無絃琴自調搏空歸去日不必借鑾鑣堂規榜白玉蟾天地神人鬼五仙盡從規矩定方圓逆則路路生顛倒順則頭頭合自然道從古有堂自近興爲神仙養素之軒乃散聖息肩之地晨昏香火上祝皇王聖壽無疆朝暮經詮下保檀那各家清吉是以隱顯莫測凡聖同居隻笠簞瓢作壺中之活計孤雲野鶴是物外之閑人散誕無拘逍遙自在黃粱夢覺安然一枕清風金汞爐開寂寞半窗明月功成行滿體妙神靈伏龍虎而出昏衢跨鸞鶴而歸洞府其或初離俗網乍入玄門性天未徹心地尚迷切宜遵守準繩久則不違模範侍師敬友念道思眞常於性命上留心莫向利名中掛意行須緩步語戒諠譁勿歌夭艷之詞莫講是非之事公私出幹不許見燈而迴打坐絶言直待鐘鳴而起來時明白掛搭去時對眾抽單稍有違犯量其罪咎輕則香油茶餅重則竹笓下山偷盜分文毁燒衣鉢飲酒賭博不許在堂職事有違理當倍罰故兹榜示各令知悉頌曰五湖雲水混處一堂旣集徒侣須明紀綱或凡或聖時隱時彰神化無定道規有常清閑跋可委者命可憑者天人無牽爾事不偶然上天生我上天死我一聽於天有何不可時有待識物有枯榮人有衰盛事有廢興龍不冬躍螢能夜飛君子小人而皆有時仲尼再思曾參三省予何人哉敢不修整人言爲信日月爲明止戈爲武羔美爲羹人有賢愚事無巨細得不艱難失必容易斷不决疑斷不可緩當斷不斷反受其亂人善不趨己惡不除謂之知道不亦難乎良如金玉重如邱山儀如鸞鳳氣如芝蘭春無再至花無再開人無再少時無再來

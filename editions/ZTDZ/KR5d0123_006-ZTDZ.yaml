front:
  text: 鳴鶴餘音卷之六隨六
  hash: sha256:7a37989f746c0b3afe055cae94bde9d255858860e3a5aec21e5fea9d5bd70921
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0123_SJB_006-240286a, image: sjb/24/240286a.png}
body:
  text: 仙遊山道士彭致中集八聲甘州何仙姑千門萬户盡七傾八倒掘地尋天眞箇玄妙返作笑胡言無爲大道人行少向捏怪途中有萬千傷感蜣毬却做靈丹無奈傷嗟最苦又不知端的枉棄了家縁時間清淨豈解汞收鉛心思意想何曾遣暫合眼隂魔作睡纏展轉越思深返作讎冤誰信無中生有有中生無萬派歸源其二一團春雪抛在玉爐中煎炎炎進火不住添要燒得通紅無焰煙須管莫虧折斤兩依然如此三千煅煉待不揺不動方可爲禪全眞養命只在恁麽之間家園自有甘露泉要澆灌黄芽長瑞蓮幽遠待得來與仙聖齊肩踏雪行曉古通今明經解義紛紛說得天花墜逐朝看畫餅怎充飢竹影難掃堂前地寡慾少思忘言得意諸家放下難爲貴若離方寸這些兒踏破鐵鞋無覓處柳梢青依稀曉星明滅白露點蒼苔敗葉故址頽垣淡煙衰草漢家宫闕咸陽陌上行人依舊名親利切改换朱顔消磨今古隴頭殘月其二悟箇不生不滅更不許拈花摘葉興則高歌醉眠芳草夢遊仙闕有時苦勸人人莫呀我叮嚀切切走骨行尸貪財變色枉消年月梅花引嵋山老頭白早人間善惡都曾造也曾窮也曾通窮通得失渾如一夢中因窮落得身無辱因閑落得心無事莫才高莫名高才名高顯於身展轉勞知事少煩惱少心忘腹熱何時了眼休抬口休開紛紛是非如何得到來獨來獨往無伴侣自斟自酌無榮辱任人非任人疑心閑自有清風皓月知望梅花死生於身最大從來與我爲害飢則求飡渴而索飲寒來又尋衣蓋好難捱晝夜相隨殃得我來忒殺捨了娘生皮袋分付了兩家自在行則穿雲倦則卧月遊戲太虚無礙甚輕快捉住風輪跨神鰲徧超法界其二是是非非休辯好弱到頭自見莫說他人休昧自己暗裏聖賢自見聽我勸自古今何曾放過一件好把塵縁拂散清清淨淨始終莫變固蔕深根長生久視難免韶華易换氣神鍊遇箇知音希夷理說與一徧其三宻宻彤雲覆地蓬蓬然朔風又起大塊呼吸陽凝隂結徧四野玉花呈瑞這些意聖感豐年顯唐虞再來治世敬道尊儒修義崇三教共同一體子孝孫賢臣忠朝正上下盡成和氣寳鼎内爇炷名香祝皇王壽延萬歲其四日向南窗猶睡疏篁外柴門從閉驀有人來輕輕敲户纔是轉身慵起正濃美一味黑甜問人間甚物堪比除是沈沈爛醉忘驚悸又忘乘墜乘也不知墜也不知齊生死一同天地這些意味悟難知却如同啞子做謎其五莫見他人長短搜己過不教自亂舊日心猿元來意馬却唤醒漸馴羈絆澄心内觀鍊就冲和把凡胎抽换事到眼前决斷教神仙别無手段地久天長虚心實腹善計者不須籌算行功滿跨朵祥雲去朝元得居仙館其六百歲韶華如電空迴首又來一遍販骨輪迴千生萬死只管改頭换面要得免捉住清風把虚空打做一片不誦南華經卷也不要葛藤相伴截斷中流剔開心眼射透玉樓金殿莫迴轉一志無移看山頭明月出現綉停針三于眞人道難說要悟般般盡皆明徹剔透玲瓏迴光返照不在拈花摘葉動生差别休舉念强生枝節本來模樣清清淨淨有何言說須憑志猛烈仗慧劎落處斬釘截鐵擊碎恩山跳出愛海打破虚空休歇氣神歡悅運九陽鍊成紅雪綵霞影裏捧出一輪皓月賀聖朝夕陽沉後隴收殘照栢鎖寒烟向南溪獨坐順風眠聽一派流泉迢迢永夜事忘閑性琴弄無絃待雲中青爲降祥時證陸地神仙其二野僧歸後漁舟纔纜緑檜生烟對寒燈瀟洒枕書眠聽石漱流泉丹爐火滅琴房人靜風自調絃待孤峰頂上月明時正一夢遊仙行香子寂寂寥寥洒洒瀟瀟淡生涯一味逍遥傍臨谷口斜枕山腰有竹籬門荆掃箒草團標寬布麻袍大緒長絛拄一條曲律藤梢黄精自煑蒼术親熬有瓦湯瓶砂釜竈葫蘆瓢其二閬苑瀛洲金谷重樓算不如茅舍清幽野花綉地莫也風流却也宜春也宜夏也宜秋酒熟堪篘客至須留更無榮無辱無憂退閑一步着甚來由但倦時眠渴時飲醉時謳其三短短横墻矮矮疏窗忔憎兒小小池塘高低疊障緑水邊傍却有些風有些月有些凉日用家常木几藤床據眼前水色山光客來無酒清話何妨但細烹荼熱烘盞淺澆湯其四淨掃塵埃惜取蒼苔任門前紅葉鋪階也堪圖畫還也奇哉有數株松數竿竹數枝梅花木栽培取次教開明朝事天自安排知他富貴幾時來我且優游且隨分過且寬懷輥金丸楊眞人一更裏擒意馬猿猴兒莫顛耍大悟來心地覺清凉管自然都放下本來面目常瀟洒眞清淨更幽雅更減口頤養氣神全按四時分造化其二二更裏夫婦會和嬰兒姹女交泰復宇宙顛倒任循環把坎离相匹配土牛木馬撼山海隨羊運搬載潑焰都輥入泥丸教鬼神須驚駭其三三更裏根蒂固玲瓏現日端午要返覆泥裏倒推車便即時揚勃土木金間隔騰烏兔刀圭至汞鉛聚降滿地白雪注黄芽看玉華金蓮朵朵其四四更裏法鼓響金雞兒木頭唱便斡旋昇降透雙關早起隨明堂過虎龍自在通來往能抽添運水火鍊黑赤爐内輥金丸迸雪白硃砂顆其五五更裏天欲曉功圓滿行都了便脫殻來往有無間顯出眞容貌古今快樂仙家延長生永無老降紫詔傳報玉皇宣駕祥雲歸蓬島兩隻鴈兒馬丹陽一更裏要精專安閑靜坐眼看猿猴耍莫放顛先須減睡眠眠心散露青天恒沙功滿大千工夫要行功圓非干是自然其二二更裏二氣運鉛消汞焰煎鉛是汞汞成鉛冲和滿洞天冲和氣任虚源九曲明珠串雙闕透射碧天元來是自然其三三更裏月正圓笙歌消夜天金童喜玉女歡凡間不一般長生酒醉不顛飲了還少年曲江上望懸懸酤買不用錢其四四更裏徹玲瓏玲瓏徹碧天登彼岸跨鳳鸞辛苦三二年言非大莫虚傳傳了無一言猿是馬馬是猿休教付兩邊其五五更裏畫角喧驚回清夢遊仙眠是夢夢是眠方知心是天天生地地生天一炁合混元添一歲減一年眞空不動然步步嬌范眞人住在古窑墓行坐立歌舞捉住這眞空猛悟自古及今說龍虎無一無一箇人悟其二傳得一口訣教我去栽接自從栽接後全别玉蘂金花果結子啞子喫餳蜜難說其三柔弱好家風大道不脫空眞箇眞箇有鉛汞水火既濟上下冲文武兩交戰齊功其四眞行與眞功刀圭快如風不遇眞師匠難明你若做時第一功渾身百關節齊通其五俺在炕上坐唱箇囉哩囉困來睡一覺如何俺把隂陽顛倒過俺笑俺笑你空坐其六貧子喫好酒喫得酩酊休萬事都不掛心頭仁毁任謗落一籌癡聾喑啞漢眞修其七無爲自然道清淨長芝草默默相知了便好杳杳冥冥閉了竈工夫片時間成了其八休執性爲眞如何出陽神十箇九箇守頑空若得命基帶了性白麵做燒餅有準其九遍地有靈芝人人都不識作得業又大難敵我今欲待說與你只恐你不信談非其十信則你自信不信你休行莫待臨渴時掘井每日見爾費苦辛不濟不濟事休論掛金索我愛閑居心鏡常皎潔境滅情忘自然無分别雲散長空露出清霄月此箇家風有口難分說其二一更裏澄心下手端然坐趕退群魔隊隊白羊過剔起心燈照見元初我方寸玲瓏寳珠懸一顆其三二更裏人靜萬事都無染一對金蟾上下來盤旋嚇退三尸奔走如雷電白雪漫漫降下璚花片其四三更裏陽生子母朝金闕海底靈龜吸盡金烏血一炁綿綿三關都透徹萬道霞光捧出西江月其五四更裏無事四邊都寧靜内放心花賞翫長春景戊己門開有箇眞人進一粒金丹運上崑崙頂其六五更裏天明還了修行願龍虎相交倒把黄河捲半空裏雷聲鬼神難測辯認得元初本來眞頭面其七齋罷閑行獨唱無人和山裏樵夫也唱哩㖮囉上了一箇坡下了一箇坡便做高官也只不如我其八過了一年又是添一歲每日隨縁爭甚閑和氣可憐韶華奔走如撚指莫待臨頭臘月三十日其九奉勸人人一一聽分訴不曉隂陽怎知修行路始初下手鍊就鉛汞體自有龜蛇引入曹溪路其十聦明君子一一聽分訴甲子天年看看降眞數跳出凡籠一箇長生路免教閻王鬼使來勾取掛金索馬丹陽一更裏端坐慢慢調龍虎運轉三關透入泥丸去龍蟠金鼎虎遶黄庭户這些兒工夫等閑休分付其二二更裏二點隂陽眞炁妙上下三關休教差錯了姹女嬰兒兩箇都放嬌金公黄婆自然匹配了其三三更裏明月正把乾坤照嚇得邪魔千里不見了退盡隂兵不用刀圭妙海底龜蛇自然相盤繞其四四更裏無事好把眞經看句句幽玄說道教修鍊不用水火不用柴和炭鍊就靈丹萬兩金不换其五五更裏天曉架上金雞叫有箇忙兒拍手呵呵笑放飽牛兒快活睡一覺行滿功成自有丹書詔綉薄眉孫仙姑勸人悟修行脫免三塗苦明放着跳出門户譚馬丘劉孫王郝太古法海慈航寰中普度其二化愚魯抛離火院夫兒女憑慧劎斬斷三塗人我山崩是非海已枯舊業消除新殃不做其三應仙舉汞鉛黑白希夷路端的下苦志工夫晝夜無眠麤衣淡飯足乞化街頭十方父母其四無憂慮孤雲野鶴無拘束草庵内閑看金書窗外林泉隈山傍水竹明月清風堪爲伴侣其五養元初心猿意馬牢拴住六賊盡不曾貪圖杳杳冥冥昏昏默默處湛湛澄澄性停命住其六認眞趣木金間隔通玄路軀四象五行圓聚炁結神凝隂陽自返復遍體薰蒸周天火足其七破昏衢地雷震動山頭雨黄芽長白雪飛舞露洒璚漿瑞草滿園圃玉蘂紛紛金花綻吐其八境堪圖翶翔雲水縱横步曲江上飛烏走兔虎繞龍蟠坎离相會聚斡轉天關運動地軸其九法輪鼓河車穩穩三十輻搬日月輥入金爐玉鼎烹煎九陽眞火煑萬道霞光千重翠霧其十罩明珠化生養就胎仙舞眞慶會姹女圓聚渴飲璚漿玉琴自然撫韻定仙音敲金擊玉十一有中無無中更有些兒做有無中裏面搜取無内藏眞有内却如無有無雙忘還同太虚十二行功足蓬萊三島群仙聚瑤池會聖賢無數盡是修眞學道列仙侣侍奉高眞西王聖母十三享天厨仙衣掛體身輕舉乘鸞鳳翫賞清都寳殿璚樓金釘滿朱户不夜長春無來無去梧葉兒調觀白鷺看烏鴉水底摸魚蝦鶯穿柳蝶戀花景幽雅若非雲門莫誇其二想林濟大慈悲究竟作根基打一棒去片皮好呆癡痛痒猶然不知其三龜毛拂兔角錐蝦蟆撲天飛泥牛吼木馬嘶少人知俯仰泄漏天機其四麥有麵粟有米布袴裏更有腿山有石海有水語眞實洞霞無極立基其五擒意馬鎖心猿神氣養交全非扭捏合自然體幽玄法眼超過大千其六玄妙塞化城關一脚蹬翻花紅處柳緑間没遮攔處處仙佛面顔其七天邊月月正圓掘地去尋天有無有顛倒顛妙玄玄正道須當要口傳其八天邊月月上絃卯酉不虚傳八兩汞八兩鉛一觔全照破了三千及大千其九天邊月月應弓眞道妙無窮龍擒虎虎擒龍兩相逢結一朵金花弄風其十天邊月月正南前後各三三離是女坎是男妙玄談不說破教人家怎參十一天邊月月應爐鉛汞鼎中居金憑火鍊就珠一胡蘆三百八十四銖滿庭芳石火光隂人身不久算來生死難防忽生或滅恰似電爭光識破形骸假合尋得箇出世仙方思量後回心向道要認箇法中王時時常見面同行同坐同飲霞漿同伴清風明月同一志同見天光同相會同師訪道同唱滿庭芳鳴鶴餘音卷之六

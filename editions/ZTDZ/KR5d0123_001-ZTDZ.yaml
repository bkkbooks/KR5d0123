front:
  text: 鳴鶴餘音卷之一
  hash: sha256:5bcbf5174193379d12b2fd6280c63311cfc4738b6df27ae9ed2f76cff08a7204
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0123_SJB_001-240256b, image: sjb/24/240256b.png}
body:
  text: 仙游山道士彭致中集解紅吕純陽洞天深處道非遠咫尺人難悟浮沉内景須憑匠手工夫專候曉來一點陽生通玄路盡藏在碧波深深處恁時主地雷震動山頭雨漸澆灌黄芽乍離土嬰兒採得携籃去向眞霞六陽鼎内烹煑搬運轉東西與南北鋪八卦九宫要知宗祖十干數内分左右要顯龍虎玄武後隨朱雀當先祥雲布曲江上萬神都來聚夫與婦癸母跨赤龍歸洞府要尋覓金翁問憑㨿隂陽會合三千數指天地海山同壽堅固吴音子欲要神仙做抱元炁胎息綿綿一回炁滿一回煎隂陽媾赤龍蟠地户牢封玄門啓滚丹砂透入泥丸崑崙上明珠晃朗瑪瑙珊珊一爐火滅一爐丹灰心顯五色光鮮雙關路上氣連連擁眞花上丹田姹女嬰兒交歡笑駕河車地火雷遷醴泉酒時時飲罷醉卧桃源無愁可解返照人間忙忙劫劫晝夜苦辛無歇大都能幾許這百年又如春雪可惜天眞逐愛慾似傀儡被他牽拽暗悲嗟苦海浮生改頭換殻看何時徹聽說古往今來名利客今只有兔蹤狐穴六朝並五霸盡輸他雲水英傑一味眞慵爲伴侣養浩然歲寒清節這些兒冷淡生涯與誰共賞有松窗月無俗念全眞大道理無窮妙得至人端的說破先天玄妙處默悟其中消息體物全彰應機獨露悟了生前畢雖明此理工夫最要綿宻低頭泄漏天機不因師指此事如何識萬類三才誰主運建立乾坤無一變化無窮包含不盡運用無蹤跡虚空打破光明遍週無極解紅三于眞人混元樸裂轉四生六道何時徹翻軀改殻沓冥中萬度生滅皆因父母匹配隂陽合精血胞衣内感成胎孕形自結不知誰腥臭穴認作自家好宅舍鑽頭撲入輪迴劫任形骸販骨高似山疊學道修眞莫著邪休言龍虎罷講龜蛇莫尋嬰姹收拾起四象三車刀圭鉛汞水火黄芽并白雪百般呼吸神和氣化弄舌性中毋令一物添心上常教萬縁絶孤然獨顯沉沉月放靈明晃朗無障無遮黑漆弩丘長春儂家鸚鵡州邊住是一箇不識字的漁父浪花中一葉扁舟睡殺江南烟雨覺來時滿目青山暮抖擻緑蓑歸去想從前錯怨天工恁也有安排我處月中仙日色西沉上高臺迥觀天地寥廓疏星隱現一輪明月昭昭無著皓然三界外似百煉青銅鏡濯處處恩光被家家照臨庭户起冥漠長生萬里清風助乾坤蕩揺雲霧難作仙宫寳殿正爛霞金碧相輝參錯大哉消夜景鎮萬古含弘磊落有志攀青桂蟾宫兔邊看搗藥春從天上來馮尊師大道幽玄似月滿寒空水湛深淵皎潔澄清鑑物無私端的此理難言問高人遥指指落花飛絮翩翩草連天嘆黄花翠竹何異眞禪雲山萬重斷續更寂寥溪壑冷浸石田霧鎖松亭風輕蘭榭時凭淨几忘詮對虚堂瀟灑灰心性一味翛然與誰傳有瓶盂燈火瓦鼎沈煙其二日月高奔道奥妙機塵世難聞太一壺中清江谷口芝草發蘭薰看金蓮佳景吐慶雲開顯生門道惟尊更資成萬化覆載乾坤如何四時受用要綿綿默默固蔕深根逆順隂陽窮通今古應變無有如神此希夷至理超名相頓了天眞到頭人向華胥相會同賞陽春其三識破榮枯萬事俱忘宴處村墟蓋世功名掀天富貴不免被物馳驅嘆南柯夢裏斷送了多少賢愚道田廬算人人有分誰肯歸歟獨余洒然脫穎任運止逍遥自在無拘蓑笠閒堆琴書高掛活計冷淡瀟踈向松間石上吟風月雲水情攄伴清虚杭烟霞高卧眞樂無餘解紅杖䔧徐步過小橋道遥遊南浦韶華暗改俄然又翠紅踈東郊雨霽何處綿蠻黄鸝語見雲山掩映烟溪外斜陽暮晚凉趁竹風清香度這閒裏光隂向誰訴塵寰百歲能幾許似浮漚出没迷者難悟歸去來田園恐荒蕪東籬畔坦蕩笑傲琴書青松影裏茅簷下保養殘軀一任世間物態翻騰催今古爭如我懶散生涯貧與素興時歌困時眠狂時舞把萬事紛紛總不顧從他人笑眞愚魯伴清風皓月幽隱蓬壺二郞神慢馬丹陽應仙舉便下手先除色慾好玉潔冰清大丈夫更休任泥拖水漉一失人身難再復莫等閑把前程失悮令略訴長生乆視五件堪爲憑據聽取第一要滌除念慮第二要忘貪戒酒肉第三要濟貧拔苦第四要常行慈善第五要精神保護依此五件功成行滿得赴蓬萊仙路金人捧露盤盤山眞人喜樂山村風月知音信任歲華交換終日掩柴門處幽軒閑看古書慵惓住坐從容獨行獨步都把聲名齗抱守元陽情忘境滅氣神和冲昇沈無碍玉爐煉至寳欲結清凉重生温暖寂寂空空没空色養眞源返朴默默熟慣靜靜與清清覺心猿意馬没絲毫亂放曠無拘恣情散誕自在道遥行滿與功成得無生儘他烏兔走飛騰休管世情遠修眞之士休宜晚甘露滴喬松光隂迅速嘆世人朝朝貪生無已假若富過石崇金玉堆積謾嬴得業相隨鎮日假瞞心昧己閻王請也從前罪業待交誰替爭如早早修持伴物外仙家抛離凡世默默湛寂别有壺中天地顯森羅月輝輝觀法界神光一體歸去也清風送朝上帝雨霖淋宋披雲高山流水嘆知音者世間能幾終南萬里烟霞歸去也歲云暮矣柱杖藥爐經卷除此外有何行李樂恬淡清靜家風一片靈臺瑩如洗就中妙處因師指下工夫戰退無常鬼匣藏三尺神劎霹靂響火龍飛起天下昇平無事白雲間笑傲而已名利客不信長生奔走紅塵裏其二金蓮七朵自甘河等閑參破丘劉譚馬孫王郝太古許來同坐兩箇披氈眞侣更漏泄祖師因果綻玉蘂萬朵齊芳香滿人間瑞烟鎖天元甲子休空過正羣仙出世交相賀全眞户牖深奥端的處要忘人我枝派後分十九住丹臺姓字名播功與行但欠絲毫上界未容我玩瑶臺馮尊師直指玄元路嘆苦海迷人不悟在目前平平穩穩又無些險難相阻把萬縁一切放下他自有聖賢提舉似斷雲野鶴飛騰向物外青霄信步慶會神仙侣渴時飲蟠桃醁醑出入在星樓月殿笑人間生死今古跨綵鳳祥鸞上太虚歸來卧碧霞深處這道遥活計難傳分付與蓬萊伴侣瑶臺第一層詠茶一氣纔交雷震動一聲吐黄芽玉人採得收歸鼎内製造無差鐵輪萬轉羅撼漸急千遍無查妙如法用工夫了畢隨處生涯堪誇仙童手巧泛甌春雪妙難加睡魔趕退分開道眼識破浮華趙州知味廬仝達此總到仙家這盞茶願人人早悟同赴烟霞瑶臺月黄粮夢斷把眼底浮華須當猛省凡籠跳出物外有何縈絆鎮相隨霞友雲朋任到處風鄰月伴道逼客無拘管遊緑水翫青山疏散這些兒快樂千金不換任人爭名奪利權且俺咱覔箇左轉處簟瓢活計占斷人間慵懶樂終朝一杭高眠放四大長舒短展紅塵内君試看算誰似我清閑堪羨向閑中别有拿雲手段其二平生懶惰只驘得一杭無憂高卧蓬頭垢面不管形骸摧挫任三光日月奔馳放四大林泉擔荷深溪畔幽巖左青山隱白雲鎖灾禍雷轟電掣無由近我日午起行了還坐把舊習般般打破清閑處惟有這些兒箇倦貪心樂受貧窮愛慾斷慵興烟火糧無貯丹無貨瀟然唱洒然和堪可神仙未了優游且過無俗念郝太古十年學道遇明師措破神仙眞訣一句便知天外事萬載千年疑絶見色明心聞聲悟道此理難言說玄關斡運心生無限歡悅放開匝地清風迷雲散盡露出青霄月萬里乾坤明似水一色寒光皎潔玉户推開珠簾高捲坐對千巖雪人牛不見悟箇不生不滅其二浮生碌碌算由天由命也由人偪暑往寒來人漸老多少興衰翻覆點石爲金指山爲寳未滿人欲千方萬計到頭那箇知足何似忙裏偷閑山間林下淨掃黄茅屋明月清風俱是伴又有山青水緑斗酒詩篇飢飡渴飲且喜無榮辱醉來還醒醒來還唱一曲其三孤身蹭蹬泛秦川西入蟠溪鄉域曠谷巖前幽礀畔高鑿雲龕棲跡烟火俱無簟瓢不置日用何曾積飢食渴飲逐時村巷求覔選甚冷熱殘餘填腸塞肚不假眞修力好惡將來糊口過免得庖厨勞役裝觀皮囊薰蒸關竅圖使添精液色身輕健法身容易將息其四丘長春同雲瑞雪正三冬鬱閉嚴凝時節寂寞山家孤悄悄終日無人談說百衲重披寒空獨坐夜永愁難徹長更無寐朔風穿户淒冽化飯朝入西村林泉夾道玉蘂凌花結凍手頻呵仍自恨濁骨凡胎愚劣晝夜參差飢寒逼迫早晚超生滅須憑一志撞開千古心月其五茅菴交坐任清虚冷淡心香頻爇認得元初眞面目萬法同歸無别行若閑雲坐猶空谷動靜成休歇重玄之妙信知擘口難說仰高彌遠鑽堅膽前忽後一點元無缺語默仙凡俱契妙禪道虚無寂滅遍量忘知盈壤靡覺表裏圓通徹玄天獨露一輪無相心月其六叅玄齟齬强鑽研道法堅如鋼鐵烏噪猿啼談不二切忌隨他分别喝下明心杖頭見性此理固難說疑團打破本來頭面輕泄無根樹上花開脉傳今古脫落輪迴劫拂子龜毛敲兔角潄石流泉長舌五派宗乗六傳祖意空立齊腰雪爲君舉似碧潭冷浸秋月滿庭芳一向沉空偏枯著靜癡人枉費工夫磨磚作鏡縁木欲求魚見月何須用指觀花悟總是眞如聦明士隨機解物無愠無愉爲仙爲佛事不增不減非實非虚露堂堂光赫赫一顆神珠混俗凝然不染居衆處塵法難拘知常用巍巍蕩蕩何所不虚無酹江月皇甫眞人鑿開混沌見錢塘南控長江凝碧令古詞人圖景誰解推原端的歲去年來日庚月甲因甚無差忒如今說破要知天地來歷道號有一可名五行顚倒互列乾坤策坎水逆流朝丙户隨月盈虧消息氣到中秋金能生水倍湧千層雪神仙妙用與潮没箇分别水調歌頭虚靖天師高眞留祕訣達士濟羣迷心清行潔天人凡聖盡歸依不在飛罡躡斗不在廣聞多學心亂轉狐疑但要除邪僞心地合神衹悟眞空離世網絶關機養成浩氣驅雷役電拯顚危混合百神歸一一念通天徹地方始了無爲叱咤生風雨扶世佐明時其二不用尋神水也莫問華池黄芽白雪算來也是假名之只這乾牛坤馬便是离龍坎虎不必更猜疑藥物無斤兩火候不須時偃月爐硃砂鼎總皆非眞鉛眞汞遇之不煉要何爲自己金翁姹女漸漸打成一塊胎息象嬰兒不信張平叔你更問他誰其三東風捲簾幙時物又新奇桃花院落小橋流水柳依依正是清明天氣芳草池塘鮮麗何處不相宜紫燕添新壘小雨洒芳菲老生涯沽酒杖釣魚磯江湖一様幾聲鷗鷺夕陽微百歲光隂石火萬疊雲山煙鎖回首頓忘機蝶夢松窗下高卧碧雲磎孤鷹馬丹陽苦海爲人隨波逐浪茫茫甚日休期爲酒色財氣一向粘惹瞞心昧己不算前程幻軀有限待作千年之計忽一朝隂公來請看你教誰替千間峻宇金玉滿堂畢竟成何濟勸諸公省早把凡籠猛跳出向物外飄蓬放落魄婪躭鶉居鷇食昏昏煉己默默地怡神養氣丹成旣濟乗彩雲跨鳳歸集賢賔王重陽仔細曾窮究想六地衆生强攬閑愁恰纔得食飽又思量駿馬輕裘有駿馬有輕裘又思量建節封侯假若金銀過北斗置下萬頃良田蓋起百尺高樓兒孫自有兒孫福莫與兒孫作馬牛貪利禄競虚名惹機勾豈知身似水上浮漚貪戀氣財并酒色不肯上釣魚舟荒盡丹田三頃荆棘多稠寳藏庫偷盜了明珠鐵燈盞滲漏了清油水銀迸散難再收大丹砂甚日成就殺曾叮嚀勸勸著後幾曾偢苦海深波浪流心閑無事却垂鈎嗚呼錦鱗終不省揺頭擺尾恣縱來來往戲波流愚迷子省貪求只爲針頭上名利等閑白了少年頭齊天樂丘長春自離東海上元本三州四人同契異域殊鄉同行並坐終日相將遊戲談玄論妙究方外之清閑道家眞味唱和從容一師法眷情何異于今分顯迥然苦志勤心磨煉各逃傾逝既是飄零難爲會合幽僻關山迢遞乾坤間隔望落落猶如曉星之勢再遇何年駕雲朝上帝其二自清都别後來人間夢中遊戲性本玄虚君臨社稷洪福齊天康濟冬温夏清任春水秋山放懷如意外物多情幻身無柰生憔悴深窮仙方道術固煉形神内觀返調元氣四大冲和三彭遁匿熟境繁華何忌眞空妙有況千古靈明自然凋弊夢覺心開廓然超萬歲永遇樂試問諸公本來模樣如何形狀縱使丹青難描這箇曠劫端嚴相無形無影觀之不見聽之又無響露堂堂不揺不動目前甚是明朗人還省悟迴光返照莫向外邊勞攘放下諸縁屏除萬事物物離心上迷雲消散性天獨露心月永無遮障與三界一切諸仙並無兩樣其二行也無憂坐也無悶長安長樂息息綿綿朝朝暮暮保養神珠一顆閑是閑非莫偢莫採大忌競爭人我滅無明心似寒灰便是道人功果猿兒不走馬兒捉住龍虎定中交媾陽降隂升日來月往爐煉長生藥抽添鼎内不須炊爨自有九陽眞火霜心子明把天機與君說破宣靜三臺牛眞人自小飄蓬身心落魄雲遊多在山東世間事看破渾是假想榮華猶似夢中蓋箇庵兒隈山靠水栽松種竹成林炕暖窗明樂清閑勝競利名月朗山東凉風細細南溪緑水粼粼漸煉得方寸如灰冷一陽生玉鼎自温秀氣氤氲仙花爛熳芳芬開遍黄庭玉女金童採將來煉就紫金運轉三關驅回四象冲和一點靈明氣結神凝聽笙簫一派樂音夙世前縁生逢正教全眞妙道幽深行滿功成跨鸞鶴上太清詠武夷白玉蟾憶昔秦時中秋日武夷九曲烟寂寂斜陽數尺寒鴉枯木三十六峰凝曉翠一溪流水生秋緑正滿林桂子散天香飛金粟神仙客金丹熟玉詔下雲生足石頭新换骨尚黏紅肉夜半月華明似晝玉皇降輦鋪殽餗笑曾孫回首幔亭前空松竹詠白蓮昨夜嫦娥遊洞府醉歸天闕縁底事玉簪墮地水神不說持向水晶宫裏去曉來捧出將饒舌被薰風吹作滿天香誰分别芳而潤清且潔白似玉寒如雪想玉皇後苑應無此物只得賦詩空賞嘆教人不敢輕攀折笑李麤梅瘦不如他眞奇絶萬年春丘長春衲襖秋來著衣漸覺時相稱霜天淨暢懷興不怕西風勁百片千條上手穿聯定寬還緊外疏狂性内放明珠瑩逍遥樂天邊月初似弓庚地又無蹤龍尋虎虎尋龍兩相逢結一朵金花弄風天邊月似偃爐鉛汞鼎中居須憑火煉流珠一葫蘆三百八十有四銖珍珠簾白玉蟾隂陽内感相交結有鉛汞分八卦羅列金鼎煉黄芽正一陽時節子後午前方進火向玉爐烹成白雪通徹這玄關深奥難輕洩因師指訣幽微把金丹大藥將來分說捉住虎龍精自然日月造化天機人怎曉换俗骨永無魔折超越望仙都稽首朝元金闕醾香自小孤雲身外無縈繫披一片搭一片逍遥快活計破葫瓢腰間掛别無行李是人笑我没操持儘教傍人點指古廟祠堂且共泥神作戲破砂盆潑瓦罐折匙無筯破紙被糊包定彎跧打睡只等待行滿功成朝玉帝方表男兒有志望蓬萊丘長春聽咨告小事要君知萬事苦求終害己得便宜處落便宜伶俐不如癡眞修煉心外莫行持只具眼前爲見在自然煩惱不相隨步步入無爲四塊玉光景如梭勸早早回頭尋活計莫被利役名牽酒色昏迷是非人我空惹閑氣鉛枯汞竭恁藏休悔謾爾傷悲便做從今下手理會寧早莫稽遲呆癡自落便宜縱養家千口成何濟枉使身心勞碌晝夜無眠老却朱顔教君憔悴何須自苦怎不回首自家推算無常有誰能替鳴鶴餘音卷之一

front:
  text: 鳴鶴餘音卷之四随四
  hash: sha256:36973f2495c85ab722e2e3c8937f518d4494cfb8e4556836063549351164f46a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0123_SJB_004-240275b, image: sjb/24/240275b.png}
body:
  text: 仙遊山道士彭致中集蘇幕遮馬丹陽上丹田玄空路玉鎖金闕八卦珠簾庫左有青龍右有白虎碧服胡僧便是三清土虎伏龍龍伏虎戰退三尸贏得河車路意馬心猿牢拴住運上崑崙透入泥丸去其二中丹田多玄妙聚寳池中五色霞光照姹女嬰兒盡歡笑鍊就金丹價值千千兆服一粒馨香妙换骨抽胎萬病消除了返老還童年又少快樂逍遥倚定岩溪曉其三下丹田明仙道有箇牛兒不喫尋常草玉液華池滋味好白雪黄芽喂得牛兒飽金龍頭銀纏繳瑩潔無塵遍地如雪罩擺尾揺頭噉聲叫過海穿江直上蓬萊島其四朗然子精氣神須保愛一粒金丹每在街頭賣四十年來無人買閙花叢裏還了鴛鴦債九三爻地天泰離上金烏飛入銀蟾界百尺竿頭做一解這些工夫任使傍人賽其五嘆人身如傀儡五彩粧成盡是虚瞞昧叉手棚頭談今古相呼相唤空向人前舞出來時如風雨氣斷之時七魄三魂去饒你棚前搥畫鼓唤不回頭終没回來路生查子夜來忽覩一場希乍見幾箇燈蛾兒堪人嗟呀愛慾貪嗔不肯捨錯認燈光隨高隨下火焰跟前百般顛耍十分燒着全然不怕直待燈盞内做箇焦巴這回休也休也休也奉勸你諸公略聽予勸休似燈蛾兒心生愛戀戀着恩愛老了面面皺髮白腰曲頭低耳聾眼暗覓箇回轉把往日風流一刀兩斷聞身康健早做箇惺惺洒洒漢猛跳出凡籠便是一箇了辦解冤結北方一日南方一日共東西四方交日夢寐沉沉往來遊行消日待他年道心開日百年短景都來幾日暗推排今朝明日不覺推排到聖賢佳音來日洞天開是吾歸日其二丘長春山河已定干戈不起太平時八方和氣齋醮頻修盛報答虚空天地謝洪恩暗中慈惠千年一遇神仙出世幸遭逢莫生輕易供養精嚴但一歲勝如一歲遇良辰大家沉醉喜遷鶯死生都怕這輪迴販骨如何得罷不悟眞常强生枝節性命了達不下有中不解無中無裏難明眞假離萬法這本來一點何處安劄敢問些兒話修眞養性如何憑執把甚是明心甚爲見性甚是萬縁不掛甚爲明月清風甚是玲瓏脫洒了眞法吿師父慈悲提携點化其二死生不怕仗剛風一掃般般都罷獨露眞常不生枝節性命亦無高下亦無内外其中就裏元無眞假明萬法這眞如一點不須安劄悟得無生話無作無爲大道無執把六二明心時時見性只此萬縁不掛處處明月清風端的玲瓏脫洒了眞法眞空自在不生不化爇心香大道無形方寸何憑在人人智見高明能降衆欲解斷群情作鬧中之閑忙中靜濁中清情態如嬰懷抱如冰自朦朧覺破前程吾言致祝君耳深聽下十分功十分志十分誠其二情慾消忘脫了根塵樂虚恬淡崇眞形如野鶴性似孤雲到處爲家風爲伴月爲鄰住世無心異俗超群握玄機哩囉哩㖮省一點顔貌常新得至眞功全眞行侍眞君昭君怨坐後談禪說道起後不依些少心口自尋思好呆癡日用機關千萬何曾滅了一件欲望做神仙好難天其二學道須憑一志無志難逃生死對境志如山自然安萬法不離清淨性定方能得命會得這玄空道必通霜天曉角浮生碌碌盡飄流世慾空恁苦爭活計被情愛海没謾儔機狡夢中競利禄縱有百般榮貴誰念光隂迅速其二世事促促莫勞心役役棄塵早歸林下蓋箇低低茅屋映窗疏竹洒洒風生玉萬叠青山爲友那管桑田翻覆促拍滿路花西風吹渭水落葉滿長安忙忙塵世裏獨自清閑自然爐鼎虎繞與龍蟠九轉丹砂就一粒刀圭餌爲陸地神仙便萬釘寳帶貂蟬富貴欲薰天黄糧猶未熟夢驚殘是非海裏眞道立身難拂袖江南去白蘋紅蓼再遊湓浦廬山驀山溪不如歸去作箇清閑漢著甚來由惹别人三長兩短天公許大何處不容身且謾着有生涯試待尋思看鑑湖裏面淺山林畔住箇小庵兒且隨分麤衣淡飯嘲風詠月蕭散過平生塵世事盡如麻我也誰能管浪淘沙脩竹間青松翠影重重道家樓閣白雲中隔岸紅塵飛不到水浸寒空此景與誰同洞口仙翁素琴彈罷倒金鍾笑傲煙霞無一事明月清風其二一箇主人翁住在靈宫無形無影亦無蹤鐵眼銅晴觀不見體似虚空出入不通風天地難籠被吾擒在藥爐中運起周天三昧火煅鍊眞容其三我有屋三間住在深山四無墻壁海遮欄萬象森羅爲斗拱瓦是青天不漏數十年也是前縁一朝功行滿三千降得活龍伏得虎方表神仙永遇樂忙裏偷閑鬧中取靜利名休競有限光隂無涯塵事貪愛何時盡無情烏兔催人早老暗裏换了緑鬢此形骸假合幻化算來有甚憑準隨縁度日和光同塵惹甚閑愁閑悶富貴由天榮華是命休更勞方寸心中無事眼前清淨俱是快活時景你若待般般稱意耐心且等跨金鸞牛眞人錦堂春璚仙朝列璚筵遇良辰名香共爇吐氤氲瑞藹祥煙慶三眞重陽五祖願當今聖主遐延昔有軒轅駕龍騰飛上朝玉帝自爭先恁時萬聖齊會宴賞共留連簫詔美金童捧盞玉女傳宣觀神宫仙苑異景降鸞鳳鶴舞翩翩仙童報蟠桃正結丹桂初圓萬載金龜千秋玉兔老人星見慶這些事洞天佳景還也勝塵縁無來去天地同壽日月齊年踏莎行一領布袍一床紙被葫蘆拄杖爲行李三盃兩盞樂天眞誰能與你爭閑氣滿眼蒼生爭名奪利朝朝只要巴家計教他喫箇土饅頭方知裏面滋味喝馬一枝花雨過山花綻霧歛雲收天漢清閑幽雅處遊翫古洞巖前時把金丹鍊不愛乘肥馬富貴榮華是非都不管獨坐茅齋看古傳把道經時轉橫琴膝上撫鶴來見紫綬金章是則是官高顯五更忙上馬爭如我仙家日午柴門猶掩探春令草堂三鼓夢遊仙到蓬壺閬苑正白雲滿地無人掃信幽圃香風旋群眞朝列黄金殿醉流霞璚宴頓覺來一片清凉意似明月山頭見黄鶴洞仙馬丹陽終日駕鹽車鞭棒時時打自數精神乆屈沉如病馬怎得優游也伯樂祖師來見後頻嗟呀巧計多方贖了身得志馬須報師恩也無夢令二首猛悟百年彈指淚似迸珠不止急解死生憂管甚石中火起石中火起一任停喪在地學道非難非易怎敢已而不已專下死工夫悟得長生活計長生活計收拾精光神氣柳梢青布袍草履歷天涯朝市與雲霞隨分有些活計杖挑周易南華客來問我浮世事無言指落華鍊就水雲情性脚踏到處爲家一剪梅麤布寬衣下領袍一襟瀟洒兩袖飄飄水雲活計伴漁樵過得今宵莫問來朝九節蒼龍仗一條仙經數卷肩上橫挑腰間懸箇小丹瓢行也逍遥坐也逍遥醉桃源本來無說本無言澄寂湛然湛然常寂炁神全希内自觀玄玄中妙妙中玄無相貌莫團圓往來去怎遮攔清風明月前女冠子馬丹陽人命無常看青雲雨過山水韶華盡過了百年如夢有似希夷忘情絶愛念好把意馬心猿牢繫綿綿宻宻有似出息常不保入息十年一似修眞理做神仙萬無一失門生莫生疑若有纖毫虚謬馬風罰作隂山爲鬼心行常不昧遍十方觀照天地累成功行自有金童來認你玉交枝我已叮嚀勸展手心休倦後巷前街茶坊酒肆且遍繞巡門散喏好降心與修行方便一志休回轉趁了今生願神氣冲和隂陽昇降虎龍爭鬭迸金燦爛繞丹田看眞人出現歸朝歡天地初分何處寄父母無生名甚字須將這箇要分明推窮此理寧論是細細傳不二亦能整究從前事往來頻不知迷迷甚日得言賜忽爾眞靈前面至認得無形觀喜示惺惺覷着甚端嚴輝輝返照通容易見時惟覓妙玄微雅深中透出圓光五般顔采復本緫祥瑞六么令王重陽眞清眞靜便是虎和龍澄澄湛湛嬰兒姹女自昇騰寂默刀圭根本齋戒换西東時中十二常常覺照内調神氣玉爐功何須尋枝摘葉豈論語丹經假餘玄妙知懶墮亦成空滅睡忘言除慾飲膳少豐融外係疏嗇人情薄淡念頭打破漸幽通賀新凉陳益之滿酌開懷酒算人生不如意事十常八九造化小兒眞厮戲到了翻前覆後謾只向塵中奔走多滿時賢口紅芍藥王通叟人生百歲七十稀少更除十年孩童小又十年昏老都五十載一半被睡魔分了那二十五載之中寧無些箇煩惱子細思量好追歡及早遇酒追朋笑傲任玉山摧倒沉醉且沉醉人生似露垂芳草幸新來有酒如澠結千秋歌笑宣靖三臺化丹陽王重陽有限形軀無涯火院刹那催促光隂想人生有似當風燭整日家晝忙夜驚有等愚迷千思萬想家縁逼迫渾沉愛子憐妻被冤家繫纜縈身猛悟迴頭名韁割斷恩山推倒重重將愛海跳出清閑樂道逍遥半張紙一張琴土榻安眠牢拴意馬莫教鬭亂身心慧劎揮時斬群魔萬神自寧二炁相交龍奔虎走金烏玉兔相迎入玉爐金鼎丹砂煉陽神出朝玉京此箇家風冰清玉潔點頭多謝知音欲要成雙全後價值千金太常引譚眞人非僧非俗亦非仙茅屋兩三椽白石與清泉更誰問桃源洞天一爐寳篆一甌春雪澆灌淨三田閑想谷神篇不覺松枝月圓其二光隂迅速不停留春去又還秋展破皺眉頭且唱和仙歌散憂百年短景爭名競利圖恁惹閑愁休恁苦貪求但得過隨縁便休其三百年勳業鏡中看嘆行路古來難風雨换朱顔更誰管安仁鬢斑掀天聲價凌雲氣勢短夢破槐安回首問青山放一片孤雲自閑青玉案無爲大道人難曉只爲工夫少猛悟迴光常返照三田之内六府之中塵垢頻頻掃諸縁斷處清懷抱一點虚靈自耀認得玄元清靜道百關調暢一性圓明得出遊仙島其二一從東别長安道西住蟠溪廟漸扣南山雲寂渺茅庵冷淡土龕瀟洒官府何曾到夜深陌上行人悄忽聽巖前子規呌聲聲相勸不如歸去爭奈工夫少賀聖朝草堂初寐青衣扃户丹頂歸巢抱瑶琴高枕夢遊仙島待閑訪三茅中宵睡覺聲如鳴珮竹被風敲隔疏林斜望斷雲飛正月上松梢解佩令一生懞懂世事不曉喫茶飯不知飢飽坐處生根立一似頑石當道任傍人笑我虚矯文藝不解豈知典教說修行無分剖面上塵埃髮髼鬆身披衲襖永長生浩劫不老粉蝶兒欲識還丹認取自家宗祖便不計當初來處是誰人椿胎骨誰人捏塑捉住這一靈性元來是鉛結聚既已爲人要了自家龍虎便不會却擒捉住把金丹一粒吞來入腹恁時免得輪迴受苦武陵春物物般般都放下熟境目然休忙裏偷閑鬧處收不挂一絲頭動靜不拘無動靜法界莫能歸境丘逍遥物外遊性似水晶毬拾菜娘丘長春一片頑心要似飛引入千古不思歸幸遇明師因曉了肯教熟境再相隨你待東時我却西我今省悟即從伊萬劫輪迴皆爲汝百般魔障更因誰二郎神小張歌也好把繁華勘破速認元初眞面目把意馬心猿牢鎖百歲光隂能有幾也不可虚過耳却聽囑付仙風道骨莫向紅塵埋墮省呵把師父親言記着你原是蓬萊洞裏仙爲思凡人間淪落速整仙胎歸上會莫荏苒俗情繫縳自思忖假饒積玉堆金終久幻化如何青梅引我笑迷人不信乖劣癡心戀貪名利縈繫落魄狂遊每將術藝養道用安身己道知和息藜杖藥瓢蓑衣蠻笠縱大地有滿地眞珠那的直甚閑氣無限峰巒聳翠略撰箇茅庵用做棲心幸有靈苗裔更兼泉水飢渴自然無礙獨坐深山裏悶看乾坤間隔望落落如曉星之勢再遇何年駕雲朝上帝玉胡蝶捉住玉山赤鳳神舟同泛激浪漂浮便使烏龜開口出頭喜謨吸洪濤枯乾北海使巨波澆灌西湖自舒敷水紋花面此日是金鋪光珠盈盈照耀恰如明月晃晃方隅普徧騰輝盡成霞彩環紆見圓珠深深漸見結寳丹空外超踰得臨大羅天上永永惺甦玉液泉這消息幾人知獨我全眞好大悟來心地清凉便分曉本來面目常照最玄妙金關開玉户閉來往通關竅遍三田覺上下和冲降銀雪黄芽遍生芝草姹嬰舞跳透引動龍吟虎嘯般運在斡旋中坎離顛倒龜蛇戰鬭水火抽添爐内燒丹結就明珠晃耀玉皇深恩宣詔祥雲攢罩恁時穩跨青鸞歸蓬島鍊丹砂浪淘沙馬丹陽行道要心堅宻䕶丹田調和眞息永綿綿十二時中常若見休要塵牽訣要避諠譁靜處安然須通語默默言傳神秀丹成行滿得去朝元點絳唇桓眞人小小瓢兒生得天然詫身矬矮瓢兒元有口難開解認得乾坤此理誰能解腰間帶道人偏愛不换金魚袋其二堪嗟人人波波劫劫貪名利何時已眼光落地到此纔方悔雖有兒孫要替應難替思下淚這場滋味認着心先碎其三丘長春昨夜醺醺醉中似覺乘丹鳳笙歌共四天飛縱悟入桃源洞正向深溪閑把明珠弄晨動一聲風送驚斷遊仙夢鳴鶴餘音卷之四

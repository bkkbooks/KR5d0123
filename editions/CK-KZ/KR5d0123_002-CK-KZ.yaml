body:
  text: 四塊玉光景如梭勸早早回頭尋活計莫被利役名牽酒色昏迷是非人我空惹閑氣鉛枯汞竭恁藏休悔謾爾傷悲便做從今下手理會甯早莫稽遲呆癡自落便宜縱養家千口成何濟枉使身心勞碌晝夜無眠老卻朱顏教君憔悴何須自苦怎不囘首自家推算無常有誰能替蘇武慢馮尊師飯了從容消閑策杖野望有何憑仗帆歸遠浦鷺立汀洲千樹好花微放芳草池塘錦江樓閣隱隱雲埋青障向東郊極目天涯不見故人惆悵歸去也翠麓崎嶇林巒掩映消遣晚來情况幽禽巧語弱柳垂金緑影小橋清響揮掃龍蛇領略風光陶謝丹青吟唱這雲山好景物外烟霞幾人能訪其二返照迴光終焉活計何處可爲依託凋零鄭圃竹塢松溪林下勝遊行樂霞友雲朋水色山光幽隱烟蘿巖壑更堂堂氣概摩天一點浩然寥廓堪愛處蝶戲花梢苔生石逕風細日高簾幕清虛氣量咀嚼乾坤高邁市朝歡約疏葛寬裁痩玉橫拖笑傲東籬吟酌把眞情欲寫奈何塵世故人蕭索其三識破塵寰凡籠跳出飄蕩幸無拘束萍蹤自在雅操孤高還若野雲麋鹿遇坎乘流混俗和光知止有何榮辱恣滔滔海上人間不管韶華催促從此後筆硯生塵蠅蝸絕念安分翠微雲屋般般放下事事都休靜對小軒梅竹一味疎慵萬古淳風便是眞常清福任群情晝夜奔波世路競爭蠻觸其四夢斷槐宮倚天長嘯勘破物情今古擔簦映雪射虎誅龍曾把少年身誤金谷繁華漢苑秦宮空有落花飛絮嘆浮生終日忙忙誰肯死前回顧爭似我玉塵清談金徽雅弄高卧洞天門戸逍遙畎畝肆任情懷閑伴蓼汀鷗鷺收拾生涯紫蟹黃柑江上一簑烟雨醉歸來依舊蘆花深處月明幽浦其五試問禪關參求無數往往到頭虛老磨磚作鏡積雪爲梁迷了幾多年少毛吞大海芥納須彌金色頭陀微笑悟時超十地三乘疑滯四生六道誰聽得絕想巖前無陰樹下杜宇一聲春曉曹溪路險鷲嶺雲深此處故人音杳千丈冰崖五葉蓮開古殿簾垂香裊免葛藤叢裏老婆遊子夢魂顛倒其六出世登眞須憑剛志决要頓開靈慧消塵止念絕愛忘憂恬淡自然知味雷震一聲火發三田半夜烏飛千里透簾幃鉛鼎温温恣飲玉漿香膩堪下手策鳳攀鸞烹金間木遊賞洞房佳瑞傾光吐秀塞海衝山眞氣遍充天地乘履風雲摘騎日月不比尋常兒戲把玄珠收取大羅歸去聖賢同域其七大道幽深如何消息說破鬼神驚駭挾藏宇宙剖判玄元眞樂世間無賽靈鷲峰前寶珠拈出明顯五般光彩照乾坤上下羣生知者壽同山海最至極翠靄輕分瓊花亂墜空裏結成華蓋金身玉骨月帔星冠符合水晶天籟清淨門庭聖賢風範千古儼然常在願學人達此希夷微理共遊方外其八避世安時同塵處順淵默至人誰識鶉居鷇食蘚逕蘿龕深密養廉甯極浮定有宜出入無方順逆神機難測樂簞瓢笑傲林泉未肯折腰形役當此際棐几松軒唇歌舌彈渴飲玉壺春色一懷皓月兩袖清風眞箇箇中消息方外生涯靜中意味不許等閑攀摘待迷雲吹散玉繩高潔自知端的其九堪嘆羣情迷津宛轉漂蕩甚時休歇爭頭競角抵死謾生一向戀家貪業利鎖名韁慾浪恩山酒市花衢顛蹷騁嘍囉似蟻循環不念鬢華如雪誰肯向大朴林中無爲鄕裏閑伴老聃莊列珠獲象罔夢斷華胥高枕洞天日月三界廓然八表冲虛湛湛靈光通徹這逍遙劫外妙哉眞樂世間難說其十過隙年光如毛塵事暗把物情移換浮生擾擾背覺隨塵酒色利名縈絆憑君看取厯代英雄楚越周秦唐漢謾遺留壞塚頽碑千古是非不斷聞早悟碧玉壺中白雲堆裏别有翠霞宮殿三天雅會五彩光攢朝赴紫微瓊宴閬苑瑤池絳闕清都信任逍遙遊翫笑愚頑苦海販骨無休往來流轉十一悟入曹溪鶴衝霄漢雲水道人活計臨川舉楫對景擲鈎澇漉錦鱗紅鯉風送漁舟透入雙峯影裏駭然明霽見烟霞極目金丹一粒貴珍難比玄妙處大一含眞玄元成象升降箇中無滯堅持九載志煉三年精進五華瓊液都在靈源洞徹九光眞境了然超彼這長生久視天機深奧上仙眞理十二創建靈壇初修丹竈保養太和眞命風生虎嘯火發龍騰燮理要依時令金木交并斗斡天關旋遶滌除心徑覩玄珠一粒流霞閃爍送歸金鼎壺內景造化希夷玄機要妙點製魄仙魂聖無中體用有理明眞悟得本來眞性還返無窮漸入青陽仙境照虛盈靜這一輪明月百年蒙閉豁然開瑩十三運氣吞霞乘風飲露須列五行爲則南山赤鳳北海烏龜堅志用心求得鉛汞相迎造化爐中烹就一丸端的這陰陽神用虛無長養浩然眞息玄關悟到此方知盲聾耳目得遇至人開剔用符妙道默運玄機瓊液轉流增益雲水清閑太虛空寂寥廓本無蹤跡這金丹一訣平生疑難渙然冰釋十四日月高奔金波滿泛七返九還延祚眞精應物大道潛身恍惚妙通玄路直待陽生造化神丹龍虎紫霄天賦這瑤函寶篆天機須仗至人開悟長生道固蒂深根仙家活計烹鍊鉛汞爲務爐輝五彩鼎耀三光識取本來眞祖明月樓前覩箇金蟬飛舞翠峰明宇把凌雲一志精誠修進上仙科舉十五元氣充飡麻衣遮體萬事轉頭何濟黃芽白雪黑水紅雲軒轅注傳名世深謝明師說破希夷妙理本來精粹把仙胎養就雲璈繚繞萬神咸備持造化箇箇圓成人人具足一氣返還資質週遊八境遍賞三山不離目前親詣堪笑迷途豈識隂陽宗祖任教邪魅煉金丹悉是乾坤英秀鬭爭豪氣十六絕粒停厨飡霞飲露返復自然相製鉛生五彩汞發三光方顯大丹苗裔開啟朱扉躍出金烏飛入玉蟾宮裏把陰陽交會神爐烹就浩然眞體虛無內紫氣盤旋玄珠閃爍射透混成宗睿忘機修道隱跡求仙常默心無凋弊貪戀榮華悮了赫赤神丹恣情抛棄有人人識道專精謹守决然超彼十七洞曉玄機深明丹竈賴與宗祖符契龍耕虎種玉液金芝好箇道家活計丹鼎容光覩箇嬰兒旋遶驚天駭地馭紫雲翠鳳相迎眞的上仙苗裔三陽首玉蘂天香琪花寶樹掩映瑞雲佳麗天光瀲灧桂影扶疏鯤化大鵬相繼休謂狂言性裏分明消息知人才藝在英豪决烈精神果敢性情高志十八志氣凌雲精神英秀得脫遍求眞理虛空爐火自己天眞遭遇便能修製師不高明咫尺如隔千里要分眞僞這黃芽赤髓時人皆有奈何愚昧眞烈士斡運機關鑿開混沌奪得夜明如意輝輝寶蓋赫赫靈光影隱大淵無滯休縱心猿盜了金鼎還丹謾勞虛費起三陽眞火時時烹煉九還逃避十九冒雪衝霜迎風沐雨得遇至人開悟通微入妙起死囘生可謂煉丹規矩離坎相交返復陰陽須藉木龍金虎把乾坤鼎器五行羅列直居眞土玄妙處種就黃芽燒成丹藥此理向誰分訴玻瓈鳳孕碧玉龍珠深飛出瑞雲處諕得三尸奔走六賊逃去顯仙胎飛舞五雲繚繞樂聲齊舉二十靜室修心雲山養道幾遇至人傳訣爐攢八卦鼎備三才修建道家基業陰與陽并斡轉樞機旋走龍虎蟠結這天機逆順學流不曉豈能分别希夷理瑞氣騰騰祥雲藹藹紫霧罩籠金闕千神咸備萬化全成方應大丹熟也琪樹瑤花遍滿虛空眞景翠紅相列觀心澄曉月清風滿目洞天朗徹蘇武慢虞伯生自笑微生凡情不斷輕棄舊磯垂釣走馬長安聽鶯上苑空負洛陽年少玉殿傳宣金鑾陪宴屢草九重丹詔是何年夢斷槐根依舊一蓑江表天賜我萬疊雲屛五湖煙浪無限野猿沙鳥平明紫閣日晏玄洲晞髮太霞林杪蒼龍騰海白鶴衝霄顛倒一時俱了望清都獨步高秋風露洞天初曉其二掃盡風雲綽開塵土落得半邱藏拙青松爲蓋白石爲床一切物情休歇幾度蓬萊布袍長劍閑對海波澄澈是誰家酒熟仙瓢邀我共看明月歸去也玉宇寥寥銀河耿耿鐵笛一聲山裂三花高擁九炁彌羅縹緲太清瑤闕手把芙蓉凌空飛步今夜幾人朝謁便翻身北斗爲杓遍散紫甌香雪其三山月來時海風不動平地玉樓瓊宇桂子飄香露華如水自按洞簫如縷杳杳冥冥泠泠厯厯青鳥解傳芳語太微中鸞鶴相求盡是舊時眞侣君聽取列豹重關鼓雷千吏天界更多官府石女簪花木人勸酒爲我此間聊住高唱微吟揮毫萬丈塵世等閑今古看春山一色青青何意斷雲殘雨其四皓月清霜釣舟如葉閑渡小溪澄碧銀漢無聲玉虹橫野斗柄正垂天北半幅烏紗數莖華髮一𣓈野鳧飛舄問回仙城南老樹能見幾何今昔西華頂十丈高花九天秋露結就翠房瑤實脫屣非難凌空何遠三咽雪融冰液辟穀神方飡霞眞訣一去更無消息笑人間長住虛空誰似一輪紅日其五放棹滄浪落霞殘照聊倚岸迴山轉乘鴈雙鳧斷蘆漂葦身在畫圖秋晚雨送灘聲風搖燭影深夜尚披吟卷算離情何必天涯咫尺路遙人遠空自笑洛下書生襄陽耆舊夢裏幾時曾見老矣浮邱賦詩明月千仞碧天長劍雪霽瓊樓春生瑤席容我故山高宴待鷄鳴日出羅浮飛度海波清淺其六對酒當歌無愁可解是箇道人標格好風過耳皓月盈懷清淨水聲山色世上千年山中七日隨處慣曾爲客盡虛空北斗南辰此事有誰消得曾記得碧眼胡僧布袍滄海直下釣絲千尺掣取鯨魚風雷變化不是等閑奇特寒暑相催乾坤不用厯劫不爲陳迹可憐生忘卻高年長伴小兒戲劇其七憶昔坡仙夜遊赤壁孤鶴掠舟西過英雄消盡身世茫然月小水寒星大何似漁翁不知今古醉傍蓼花螢火夢相逢羽服翩躚未必此時非我誰解道歲晚江空風帆月力橫槊賦詩江左清露衣裳晚風洲渚多少短歌長些玉宇高寒故人何處渺渺予懷無那嘆乘桴浮海飄然從者未知誰可其八歸去來兮昨非今是惆悵獨悲奚語迷途未遠晨景熹微乃命導夫先路風颺輕舟候門童稚此日載瞻衡宇酒盈樽三徑雖荒松菊宛然如故聊寄傲與世相違舊友都忘更復駕言焉取琴書情話尋壑經邱倦鳥岫雲容與農人吿我有事西疇孤棹賦詩春雨但樂夫天命何疑委化任渠留去其九十載燕山十年江上慣見半生風雪對雪無舟泛舟無雪不遇並時高潔斷岸殘沙今兹何夕一似剡溪歸越但掀篷數尺梅花人迹鳥飛俱絕君不見五老危顛浮邱絕頂笑我早生華髮返老還童易麤爲妙空有九還丹訣霽景浮空天光眩海一體了無分别便堪稱六乙仙公千古太虛明月其十六十歸來今過七十感謝聖恩嘉惠早眠晏起渴飲飢飡自己了無心事數卷殘書半枚破硯聊表秀才而已道先生快寫能吟直是去之遠矣沒尋思拄箇青藜靸雙芒屨走去渡頭觀水逝者滔滔來之衮衮不覺日斜風細有一漁翁驀然相喚你在看他甚的便扶携穿起鮮魚博得一樽同醉十一一逕通幽畫屛橫翠行到白雲深處世外蟠桃井邊佳橘别有種芝瑤圃檀板輕敲素琴閑弄奉獻鳳膏麟脯舞翩翩鶴髮飄蕭仍似舊時仙侣君看取華屋神仙滿堂金玉此是蟪蛄朝暮五色蓬萊九秋鵰鶚别有出身之路酒熟麻姑雲生巫峽稽首洞天歸去任海波清淺無時何處緑窗雲戸十二雲淡風輕傍花隨柳將謂少年行樂高閣林間小車城裏千古太平西洛瞻彼泱泱言思君子流水儼然如昨但清遊天際輕陰未辯暮愁離索長記得童冠相隨吟咏鳶飛魚躍逝者如斯吾衰甚矣調理自存斟酌清廟朱絃舊堂金石隱几似聞更作農人吿我有事西疇窈窕掛書牛角滿江紅馮尊師寒暑相催俄然又秋傳信驚往事幾番成敗百年如瞬軒冕未酬黃卷志琴書早賦青山隱占五湖煙月樂希夷無盈損人間事多愁恨方外趣别風韻這瀛洲甯美玉堂金印徇物情懷兒女操摩天頭角神仙分看碧霄歸去彩鳳迎白雲引其二雨過東郊溪痕淺山堂春曉堪愛處桃花流水閑雲幽鳥物表羣分紅日天涯一點青山小向緑陰竹影捲柴扉終焉了清閑處誰知道方外客人間少且襟風杯月醉眠芳草大志含容天地考眞情卓立希夷杳謾將消息寄林泉煙霞老其三今古高情都緣在林泉江曲知此身如幻甯羨錦衣華屋雅志偏憐雕浦月達人豈羨金山玉喜滿庭花影日篩金苔斑緑終焉計東籬菊虛心杖南軒竹枕琴書高卧坦然無辱萬古興亡春夢覺一溪雲水平生足看武陵三秀噴幽香芝田熟其四東里先生家何在山陰溪曲對一川平野掩映數間茅屋昨夜江頭新雨過門前流水清如玉傍小橋環合柳參天搖新緑疎籬畔叢叢菊虛簷外蕭蕭竹嘆古今得失是非榮辱須信人生歸去也世間萬事何時足問此春新釀酒何如今朝熟其五一片閑心明洞達天心無曲身未能輕舉權作道家梁屋壺內時看吞日月世間不羨堆金玉任自虚幻轉光陰披紅緑丹砂井黃金菊靈芝草琅玕竹對無情瀟灑有何榮辱大夢百年方外去平生萬事心頭足向人間三度見河清蟠桃熟其六一片閑心髑髏子無窮生滅被化機搬弄馳騁許多顛蹷販骨如山成底事迷情似海難超越痛亘初靈物久被沉埋塵沙劫求出離須猛烈尋知友談冰雪下工夫磨煉靈光明徹風定波澄潭底見雲開冷浸天心月問啞人飡蜜味如何無言說其七雲陽子竪起空拳休着相秤鎚是鐵敢承當時要丈夫剛烈古佛拈花微微笑今時幾箇齊腰雪嘆杜鵑啼得血流枝誰知切啞人夢難分别耳聾漢偏解說有孤峰頂上木人饒舌鳥噪猿啼談不二松風澗水眞玄泄這機關打破看寒空家家月其八元本當初無一物萬緣濛漠嘆同流學道誰肯死前除削兩掌三拳空熱鬧揚眉瞬目千般作看眼光落地見賢家抬手腳絕妄念忘人我名利斷是非趓伴烟霞深處坦然行樂境滅心忘無生豁斷雲來往寥天廓顯一輪孤月射寒潭實無錯其九莫月鼎法在先天玄妙處無言可說其要在守乎中正靈臺瑩徹太極神居黃谷內先天炁在玄關穴寂然不動感而通憑剛烈運風雷祈雨雪役鬼神驅妖孽只此是非呪非符非罡訣寂定神歸元谷府功成行滿仙班列翫太虛穩穩駕祥雲朝金闕其十買得青山便收草鞋藜杖更不過建章宮下灞陵橋上天地蝸牛蠻觸待功名蟻穴槐安相近新來白髮幾多長三千丈從今脫紅塵網青石枕松風響有商山四皓閑來往火棗便宜秋露滴交梨正要春温養算古來誰似我逍遙陶元亮春邱長春山中好最好是春時紅白野花千種樣間關幽鳥百般啼空翠濕人衣茶自採笋蕨更同薇百結布衫忘世慮幾壺村酒適天機一醉任東西夏山中好長夏正相宜脩竹萬竿金鎖碎飛流千尺玉簾垂何處有炎曦松影下散誕更無拘沉李浮瓜供枕簟蒼松白石伴琴碁一醉任風吹秋山中好秋景不凄凉白酒黃鷄新稻熟紫茱金菊有清香橘緑滿林霜涼月白松檜鬱蒼蒼但見村翁歌賀社不聞丁壯在門傍一醉又何妨冬山中好末後稱三冬紙帳蒲團香淡碧竹爐茶竈火深紅交袖坐和沖人如夢百歲等閑中梅蕊綻時泉脉動雪花飛處雁書空一醉徒春風月上海棠劉鐵冠全眞辦下無空過布袍麻絛腋袋掛剪髮髼頭逍遙自在行踏簞瓢把每日沿門乞化低頭稽首纔道罷又撞着箇魔頭來說話問道先生元是甚麽人家隨緣答俺師父邱劉譚馬其二昨夜因打北邙山過見箇骷髏兒道邊卧雨洒風吹骷髏被牧童打破知他是李四張三王大低頭無語思量我大限來時怎趓軃家有千金難免這場灾禍休爭我到底一家一箇其三吾言勸了千千萬無一箇回頭猛烈漢教上千般猶道火院牽纏絆沒計算一限又推一限憂兒憂女沒衣飯指望百年永作伴閻王來追鬼使上門喚拖將去也不道家緣不辦山亭柳世事堪憂光景難留春去又逢秋四季催人老百年似蝶夢莊周勘破從前似假着甚攬閑愁慷慨幸遇希夷教塵情事一筆都勾下志速勤修有等愚癡輩馬丹陽喚不回頭打的無緣

front:
  text: 業鬼有分做骷髏
  hash: sha256:dd3001d1b9cf00bd3b89ded82f2393a7124dd90bf8ccdd651f2fdefb0597132c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0123_CK-KZ_01p028b, image: JY240/CK-KZ_JY240_01p028b.png}
body:
  text: 滿庭芳王重陽汝奉全眞繼分五祖略將宗派稱揚老君金口親付與西王聖母賜東華教主東華降鍾離承當傳玄理富春劉相呂祖悟黃糧登仙弘誓願行緣甘水復度重陽過山東遊厯直至東洋見七朵金蓮出水邱劉譚馬郝孫王吾門弟天元慶會萬朶玉蓮芳其二馬丹陽吾劍非凡玉皇宣賜非吾誰敢承當青蛇三尺時復起祥光剔起乾坤骨髓劈開太一眞陽何人鑄耶溪歐冶金水配柔剛不知何處用除邪斬怪甯靜諸方斡開萬象盡化玄霜惟有修行不謹輕輕指魂魄飛揚匣中響雷聲震動萬里鬼神藏其三搭手尋思百年如夢算來何不清閑逍遙快樂且樂一身安日月韶光似箭不覺人老花殘思今古從前勇猛盡葬在北邙山不如心行善無煩惱養就朱顏怕無常限到意馬牢拴神炁休教敗壞鎖白牛常在金欄修行事自家性命莫作等閑看其四三于眞人落魄閑人逍遙懶漢逢人不語西東騰騰兀兀來往似塵中乞化前街後巷安居住古廟閑宮傍人問這般懶漢卻是甚家風諸公休分辯三清上聖鍾呂爲宗拜邱劉譚馬斡運神功得處玄玄妙用清虛志款款朦朧眞空就長生話三教習皆通其五年小靈童出家學道師言側耳須聽清晨早起掃地莫揚塵梳洗身邊潔淨然後刷釜拈盆厨房內油鹽米麵休得費半毫分客來須接待行須緩步語要低聲守清貧寂淡莫戀浮榮遇晩端身正坐心清淨滿目光生休改變天長地久自有好前程其六昨日花開今朝花謝算來眼下時光成家立計劫劫與誰忙纔見青春年少霎時間緑鬢成霜堪嗟嘆人身不識自恁苦無常不如早悟金銀過斗難免無常思鄕嶺上空滴淚成行兒女無箇肯替到頭來獨自承當聽吾勸迴光返照相伴馬丹陽其七男作行尸女爲走骨爺娘總是骷髏子孫後代番作小骷髏日久年深長大辦資財匹配骷髏聚滿堂活鬼終日翫骷髏當家骷髏漢忙忙劫劫長養骷髏有朝身喪誰替你骷髏三寸主人氣斷活骷髏相送死骷髏休悲痛勸君早悟照管你骷髏其八歸去來兮不如歸去算來都是便宜也無煩惱也沒是和非選箇巖前淨處好蓋箇小小菴兒黃昏後安眠一覺直睡到大齋時此外别無事逍遙快樂幾箇人知高官好做也要追陪假若前遮後擁金魚帶壓損朝衣思量後一箇口裏插得几張匙其九道教初興釋門微顯一興一廢如然達磨闡教東土至西天都是後學晚輩貪酒色損壞眞源爭財氣不依教法也望到西天三千年一遇全眞大教甲子天年邱公闡教萬朶金蓮上界羣仙在世諸魔難道化才賢君知否今番不遇更待萬餘年其十兒女如花妻顏似玉算來眼下時光積財千萬難買不無常驀地陰公來請無辭訴更不推忙空歸去資財換主兒女各分張聰明賢達者早離火院趓了忙忙逍遙散誕落箇清閑飢後巡門化飯寒來紙布衣裳無牽繫神仙未了落得壽延長十一身是庵兒性爲庵主耳便是門窗壁中爲舍腹是厨房心是當厨博士運水火煉就元陽心甯守依時飯熟盛與主人嘗休出庵外去些兒迷路難奔家鄕端然庵內坐修補中央運就金梁玉柱透清風明月靈光安然坐不搖不動怕甚惡風霜十二大道無形難言難說世人不曉其根不憑清淨數墨强尋文若是只憑經典世間有多少能人都成道九天之上塞滿玉皇庭何須開辯利休窮周易罷講黃庭眞清眞淨心上要無塵自有神仙提挈恁時節得赴玄門幽微處逍遙快樂終日囉哩㖫十三遇此荒年天下門徒受魔受難過此番纔顯眞誠道友刹那慷慨應過天仙廣化天尊忠昭烈士甲子旬中要五千加剛志九天仙闕無數金蓮逢魔一志當先心上休教邪共偏舉刀時一性如山不動三清上聖到處隨現不在功全不須行滿一志無疑上聖勸諸門弟肯忘形忘體隨我昇天十四甘草人參天麻芍藥薄荷荆芥川芎乳香沒藥白芷共甘松玉金梨蘆桔梗甘菊花藁本茯苓防風等細辛分兩各自要均停問甚渾身壯熱管甚偏正夾腦頭風着將一字㗜鼻中當下神功有準李貴妃曾壞雙睛端的效章宗見喜加做一提金十五二氣旋還三宫升降往來於數無窮透關神水鉛汞過三峯返復周流八脉戊己煉陰虎陽龍凝精處金花的的外見形容靈光眞造化天機深遠推測難通算利名酒色恰似秋風大道玄爐進火三田內養出神功功成後天書來召平步赴瑤宮十六眞鐵牛兒形容醜惡性剛强偏好爭馳人人皆有那箇解牽騎種就黃芽滿院更須用神水澆之中宮裏若無此獸安得嬰兒乾坤眞動靜生成活計總賴於伊飢餐虎髓渴飲水銀池夜半牽連進火明光迸海底騰輝牧童向華池宴罷乘箇月明歸十七石火光陰人身不久算來生死難防忽生或滅恰似電爭光識破形骸假合尋得箇出世仙方思量後囘心向道要認箇法中王時時常見面同行同坐同飲霞漿同伴清風明月同一志同見天光同相會同師訪道同唱滿庭芳滿庭芳修鍊白玉蟾鼎用乾坤藥須烏兔恁時方煉金丹水中虎吼火裏龍蟠况是兌鉛震汞自元谷上至泥丸些兒事坎離復姤返老作童顏五行全四象不調停火候間斷如閑六天罡所指玉出崑山不動纖毫雲雨頃刻須直透三關黃庭內一陽來復丹就片時間其二道釋儒門三教歸一算來平等肩齊道分天地萬化總歸基佛在靈山證果六年後雪嶺修持儒門教温良恭儉萬代帝王師道傳秘訣佛流方便忍辱慈悲大成至聖豈辯高低都是後學晩輩分人我說是談非休爭氣三尊一體瞻仰共皈依其三這炷名香天然清秀生於象帝之先金爐焚處裊裊起祥烟不是沉檀乳降亦不是四和龍涎括來獻先賢後化五祖大羅天此香靈妙處遍周法界氣味眞全開人鼻竅入至通玄願八荒四海同霑至化道氣綿綿從今後一人有慶萬萬餘年其四命似清風性如朗月瑩然獨見輝輝靈光普照何日不歸依常在無明之處任昇騰斗轉星移通眞理不無不有動靜應神機其間多少事皆是方寸或是或非在人人運用志見高低悟者頭頭皆是未明時處處皆迷修眞士觀天行道功滿步雲歸其五壽竹長青壽松高聳壽山壽水俱全壽星壽夜壽象現中天壽祝長生不老壽香一炷寶鼎龍涎壽童引壽龜壽鶴壽燭比金蓮壽盤添壽果壽桃初熟壽滿三千壽筵歌壽曲壽酒與流連壽從今去福壽無邊壽仁者壽門高大福壽永綿綿其六辰出街頭酉歸堂內切須規矩隨身志誠香火早晩去朝眞遍厯名山福地不恥問參訪高人休誇逞斷除人我心地放教平燒丹並煉藥琴暮書畫各有司存應干請祈法術都是謾勞神且任隨緣乞化省多少勞碌精神團圞坐齊同慈愛異骨總成親其七減飯除情敵魔戰睡聖賢學道根基進人退己用事契心機遇境休生烟火安閑處性要無疑爭知道洪波跳出卻還入希夷罷貪財色酒氣掣開利鎖截斷嗔癡完全性命物外何爲悟徹元初色相功成也歸去來兮乘丹鳳蓬萊宮裏獨步訪鍾離其八稽首諸兄略聽吾勸化飯朝日隨緣殘餘好惡只要自心堅飽後歸庵靜坐無益語閉口藏言他人過見如不見方寸得安然且休尋玄妙牢拴意馬堅鎖心猿去除人我滅火消烟晝夜敵魔戰睡常寂靜調息綿綿君知否如斯妙用子母自團圓其九今日榮華前生福善悟來更好重修百年光景生滅水浮漚販骨無休歇歡未盡又遭愁愁嗟人世忙忙造業幾箇肯抽頭清閑歸物外逍遙獨步身內閑搜把汞鉛顛倒性月如秋直待功成行滿超三界永列仙儔乘雲去眞容不朽免再卧荒邱其十清淨家風如常合道本來面目休迷行住坐卧何處不相隨達理頭頭解脫明心無作無爲君還悟絲毫放過畫餅不充飢古今賢達者伏無情慧劍斬斷昏迷把三尸趕退六賊分離雲散天心獨露吐紅霞烹鍊須彌眞功至長生活計能有幾人知十一恬淡家風寂寥活計無爲無作無言行住坐卧莫放馬猿顛性有調和柔弱觸來無火無煙通眞理無情無慾無罪亦無愆諸公休外覓天眞一點元在心間被黑雲遮障不計餘年好用清風吹散雲收處露出青天森羅見一輪明月光耀照無邊十二過去休思未來莫想見前一念俱忘三心滅去顯出法中王便是生前面目無形貌獨露堂堂玄玄理四方眞炁攢結聚中黃閑閑常內守勝如塵世苦海茫茫隨緣隨分柔弱和光漸漸輪迴路出看看近來到蓬莊功成日携雲獨步朝見禮虛皇十三武當降筆辛天君玉皇傳宣搜求仙子六百餘員仙官仙位補闕大羅天勅下諸神採訪隨方所選覓高賢三元日書人功行飛奏御爐前全眞門弟子修功積行專要心堅猛降龍伏虎煉汞烹鉛一旦天書選舉雲霄路快著仙鞭朝金闕三清殿下作箇狀元仙十四百歲光陰渾如一夢不覺過春秋憨癡愚昧日夜爲家憂衣食前生注定更何須物外貪求當思忖深坑火院終日箇如囚諸公聽我勸兒孫福祿莫與爲牛把恩情挫碎物外精求管甚紅輪西墜儘教他月出東頭降心定囘頭是岸咫尺到瀛洲十五盡說烟消皆言火滅觸來總是無明不知不覺怎得離衆生道本易行易曉奈心迷難曉難行心魔障未成大善方寸不能營同流聽囑付是非休辯人我休爭嘆行尸走骨何辱何榮急救自家性命炁神和清潔眞形靈靈語蓬萊閬苑三島是前程沁園春呂洞賓世事紛紛似水東傾甚時了期嘆利名千古爭馳虎豹邱原一旦總伴狐狸荆棘叢中桑榆影裏亂塚堆堆知是誰君知否謾徒勞百載空皺雙眉爭如歸去來兮放四大優游無所爲歸碧岩洞完性命臨風對月笑傲希夷一曲弦歌千鍾美酒日月循環不老伊童顏在鎮龜齡鶴壽罷唱黃雞其二不喜輕裘布衣芒履任春與秋傍人笑我生涯拙塵寰碌碌畢竟何求物外蓬瀛壺中方寸論此宗風沒價酬誰知道無爲快樂不羨王侯多謀轉使多愁恰似吞他名利鈎看日前些子昇沉事把天機喪盡不肯抽頭蜂爲花忙蛾因燈逝只恁迷前忘後憂嗟身事莊周蝶夢蝶夢莊周其三大道無名大音希聲大器晩成笑迷人管見不言便了似鑽冰取火紐石爲繩使盡精神虛勞神用緣木求魚甚日烹愚癡輩磨磚作鏡怎覩光明何須百計經營守樸樸湻湻絕愛憎澄虛心實腹谷神不死深根固蒂久視長生湛湛澄澄先天先地一炁寥寥混杳冥希夷理這一輪皎月無缺無盈其四瑞雪翻雲長風舞浪仙家畫圖問城南老樹如今在否洛中强客還再來無獨上君山渺觀磊石八百里清波漾巨區何曾錯有茶中上竈酒裏仙姑終須度了肩吾卻稽首終南眾老夫自太平寺裏題詩去後東林沈宅大醉歸歟天上巡多人間到少更不向廬山索鱠魚相憐否好借君黃鶴上我清都其五黄鶴樓前吹笛之時先生朗吟想劍光飛過朝遊北海墨籃放下夜醉東林鐺煮山川粟藏世界有明月清風如此心呵呵笑釀成白酒散盡黃金知音自有相尋休踏碎葫蘆斫斷琴唱白蘋紅蓼廬山日暮西風落葉渭水秋深三入岳陽再遊湓浦一自悠悠直至今桃源路不妨來往同與登臨其六切勸學人悟取靈臺休得外求這天機玄妙非容易與君今日細說根由沒口婆婆偏能言語沒腳童兒擅蹴戲毬眞消息見雲埋玉洞月照金樓有誰似我能修把獅子擒來變作牛向黃河浪裏翻筋斗太陽宮裏捉住獼猴白雪花開青雲子結占得玄關第一籌仙宮舍跨驪龍歸去永翫瀛洲其七昨夜南京今朝北嶽倏焉忽然遇洞中有酒渴來好飲君山作枕醉後高眠出入無迹往來不定半似癡呆半似顛隨身處有一襟風月兩袖雲煙人間漂蕩多年又排辦東華第二筵把玉樓推倒種吾琪樹黃河放淺栽我金蓮擊碎珊瑚翻身蓬島稽首虛皇御座前無難事功成八百行滿三千其八打破疑團謝了空花飲啄隨緣有蒲團禪版消磨白日臨風對月可度流年携箇山童拖條藜杖閑趁松風影裏眠從今後袖金針玉線頓鎖爲煙何須祖祖相傳被渭水松風泄盡禪昔年會向水中摸月如今卻解火裏生蓮向上宗乘别無玄妙十百元來是一千翻身處見漚停巨海雲散長天其九瑞雪長空布滿周天色似銀況此物不論貧富應無深遠觸處皆均片片不教塵污落處冥冥不聽聲江天靜見天華宇宙景物皆新教人驀地歡欣似一派銀河徹底清聚時節如鋪玉散來後無踪無影無形此是天機眞造化不比尋常假造成陰消盡待三陽數足别換新春其十自古賢愚日月輪催盡沉下泉漢張陳義斷因名利恣奢華後破壞家園墳廟江邊漢陵原畔勢盡還空皆亦然英雄輩盡道傍壞塚衰草綿綿嗚呼往事堪憐染虛幻浮花逐逝川又爭如省悟塵勞愛趣貧閑居素保煉丹田越過輪迴超昇苦海直上清凉般若船逍遙岸會玄妙雲路同訪桃源十一好無來由名利區區幾時盡頭算榮華富貴名高位顯妻兒艷女肯做持修冷淡玄門清虛妙道苦澁難行孰意留修行路悟輪迴生死有分仙流除身外盡是閑愁猛割斷冤情去便休頂幘巾布素隨緣度日逍遙雲水物外遨遊閑裏尋閑損之又損火滅煙消絶外求將歸去這酆都路變蓬島瀛洲十二絶品龍團製造幽微建溪路賒向南山採的蟾酥烏血和合北海七寶靈芽時遇陽春收歸璚室碾磨搗香塵膩水加玉甌內仗仙童手巧烹出金花奇茶堪獻仙家但啜罷香生兩腋僥倖趙州難遇盧仝不見苦中甘味意與誰誇滌盡凡心洗開道眼返老還童鬢似鴉眞奇瑞願人人解飲同赴煙霞十三自古神仙隱跡終南萬代流傳說經臺上針活枯栢鍊丹爐下化女石泉四皓商山十老古洞尹喜親聞道德篇結庵處有青牛繫柏白鹿昇天翊聖古跡依然雪樣三朝畫得全有元眞文澗松陰一夢鍾離悟道跨鶴金仙二祖披氈甘河引度傳受重陽七朵蓮全眞教洞天福地象帝之先十四火院牽纏夜去明來早晩休今日不知明日事忙忙劫劫苦苦貪求人似風燈草頭珠露俺見傷心珠淚流不堅久似石中迸火水上浮漚休休聞早回頭把往日風流一筆勾麤衣淡飯隨緣過任傍人笑我我又誰偢限到頭來不論貧富着甚來由日夜愁聞年少把家緣棄了海上雲遊十五眞一長存太虛同體妙門自開旣混元初判兩儀布景歸根復命全藉靈臺浩氣衝開谷神混化一點靈光空際來凝神處聽龍吟虎嘯殺地風雷奇哉妙道難猜解點化愚迷成大材與君說破分明狀似蚌含淵月秋兔懷胎壯志男兒當年高士莫把身心惹世埃功成後便高登紫府位列仙階十六要做神仙鍊丹工夫亦有何難向雷聲震處玉爐火熾土釜煙寒姹女乘龍金翁跨虎片餉之間結大還丹田裏有白鵝一箇飛入泥丸河車運上崑山全不動纖毫過此關把龜蛇烏兔生擒活捉霎時雲雨一點成丹白雪漫天黃芽滿地服此刀圭永注顏常温養使脫胎換骨身在雲端十七大智閑閑放曠無拘任其自然寄雅懷幽興松間石上高歌沉醉月下風前玉女吹笙金童舞袖送我元炁入太玄玄中理盡浮沉浩浩來去綿綿奇哉異景難言算别是人間一洞天立身敦厚銷磨歲月從他輕薄海變桑田神炁冲和陰陽昇降已占逍遙陸地仙無煩惱任開懷縱筆注寫書篇十八馮尊師和曠劫威音頓悟之時不假外緣任騰騰兀兀天涯海角閑雲野鶴豈管流年月下風前逍遙自在興則高歌困則眠囘頭處落花飛絮遠水輕烟本來無說無傳道乃强名豈有禪這桃紅柳緑自然消息何須扭捏擊竹拈蓮大相無形眞空非有論甚纖毫與大千石獅子敢胡言貉語說地談天十九古往今來一刹那間又早百年任石崇富貴陳平貧賤顏囘短命盜跖長年南陌新阡北邙舊塚盡是許多愚共賢全不見金釵十二珠履三千只因不鍊還丹箇箇道凡夫無宿緣庭前頑石尚能聽法城南老樹猶解成仙斗酒篇詩張琴隻劍具結人間歡喜緣人問我如何是道笑指青天燭影搖紅金菊初開玉蟾新滿昇天皎重陽佳致始恢弘圓鑑亭亭照上界中央奮矯桂花鮮雲收八表緑枝裊裊素魄團團於中奇妙細蘂繁英洞天幽圃知多少高臺深夜最堪觀得遇圓明了風動清香盤繞爛銀霞交光池沼一叢霜氣萬古冰輪冲和誰曉臨江仙達道逍遙無事客狂歌度日欣欣孤然一性朗然眞清如三島月閑似九霄雲語話參差絶世夢心頭不掛微塵四時遊翫百花親壺中天不夜物外景長春鶯啼序呂洞賓三峯路險雪滿空崖瑞祥煙霧起澗畔聽龍吟虎嘯電閃星輝

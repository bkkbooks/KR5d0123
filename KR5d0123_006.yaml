front:
  text: 鳴鶴餘音卷之六隨六
  hash: sha256:7a37989f746c0b3afe055cae94bde9d255858860e3a5aec21e5fea9d5bd70921
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0123_HFL_006-001a, image: hfl/0745/0745-004.png}
body:
  text: 仙遊山道士彭致中集八聲甘州何仙姑千門萬户盡七傾八倒掘地尋天真箇玄妙返作笑胡言無為大道人行少向捏怪途中有萬千傷感蜣毬却做靈丹無奈傷嗟最苦又不知端的枉棄了家緣時間清淨豈解汞收鉛心思意想何曾遣暫合眼隂魔作睡纏展轉越思深返作讎冤誰信無中生有有中生無萬派歸源其二一團春雪拋在玉爐中煎炎炎進火不住添要燒得通紅無焰煙須管莫虧折斤兩依然如此三千煅煉待不搖不動方可為禪全真養命只在恁麼之間家園自有甘露泉要澆灌黃芽長瑞蓮幽遠待得來與仙聖齊肩踏雪行曉古通今明經解義紛紛説得天花墜逐朝看畫餅怎充飢竹影難掃堂前地寡欲少思忘言得意諸家放下難為貴若離方寸這些兒踏破鐵鞋無覓處柳梢青依稀曉星明滅白露點蒼苔敗葉故址頽垣淡煙衰草漢家宫闕咸陽陌上行人依舊名親利切改换朱顔消磨今古隴頭殘月其二悟箇不生不滅更不許拈花摘葉興則高歌醉眠芳草夢遊仙闕有時苦勸人人莫呀我叮嚀切切走骨行尸貪財變色枉消年月梅花引嵋山老頭白早人間善惡都曾造也曾窮也曾通窮通得失渾如一夢中因窮落得身無辱因間落得心無事莫才高莫名高才名高顯於身展轉勞知事少煩惱少心忘腹熱何時了眼休抬口休開紛紛是非如何得到來獨來獨往無伴侣自斟自酌無榮辱任人非任人疑心間自有清風皓月知望梅花死生於身最大從來與我為害飢則求餐渴而索飲寒來又尋衣蓋好難捱晝夜相隨殃得我來忒殺捨了娘生皮袋分付了兩家自在行則穿雲倦則卧月遊戲太虛無礙甚輕快捉住風輪跨神鰲遍超法界其二是是非非休辨好弱到頭自見莫説他人休昧自己暗裏聖賢自見聽我勸自古今何曾放過一件好把塵緣拂散清清淨淨始終莫變固蒂深根長生久視難免韶華易换氣神鍊遇箇知音希夷理説與一遍其三密密彤雲覆地蓬蓬然朔風又起大塊呼吸陽凝隂結遍四野玉花呈瑞這些意聖感豐年顯唐虞再來治世敬道尊儒修義崇三教共同一體子孝孫賢臣忠朝正上下盡成和氣寶鼎內爇炷名香祝皇王壽延萬歲其四日向南窗猶睡疏篁外柴門從閉驀有人來輕輕敲户才是轉身慵起正濃美一味黑甜問人間甚物堪比除是沈沈爛醉忘驚悸又忘乘墜乘也不知墜也不知齊生死一同天地這些意味悟難知却如同啞子做謎其五莫見他人長短搜己過不教自亂舊日心猿元來意馬却唤醒漸馴羈絆澄心內觀鍊就沖和把凡胎抽换事到眼前決斷教神仙别無手段地久天長虛心實腹善計者不須籌算行功滿跨朵祥雲去朝元得居仙館其六百歲韶華如電空回首又來一遍販骨輪回千生萬死只管改頭换面要得免捉住清風把虛空打做一片不誦南華經卷也不要葛藤相伴截斷中流剔開心眼射透玉樓金殿莫回轉一志無移看山頭明月出現繡停針三于真人道難説要悟般般盡皆明徹剔透玲瓏回光返照不在拈花摘葉動生差别休舉念強生枝節本來模樣清清淨淨有何言説須憑志猛烈仗慧劎落處斬釘截鐵擊碎恩山跳出愛海打破虛空休歇氣神歡悅運九陽鍊成紅雪綵霞影裏捧出一輪皓月賀聖朝夕陽沉後隴收殘照柏鎖寒煙向南溪獨坐順風眠聽一派流泉迢迢永夜事忘間性琴弄無絃待雲中青為降祥時證陸地神仙其二野僧歸後漁舟才纜緑檜生煙對寒燈瀟灑枕書眠聽石漱流泉丹爐火滅琴房人靜風自調絃待孤峰頂上月明時正一夢遊仙行香子寂寂寥寥灑灑瀟瀟淡生涯一味逍遙傍臨谷口斜枕山腰有竹籬門荆掃帚草團標寬布麻袍大緒長絛拄一條曲律藤梢黃精自煮蒼术親熬有瓦湯瓶砂釜竈葫蘆瓢其二閬苑瀛洲金谷重樓算不如茅舍清幽野花繡地莫也風流却也宜春也宜夏也宜秋酒熟堪篘客至須留更無榮無辱無憂退間一步著甚來由但倦時眠渴時飲醉時謳其三短短橫墻矮矮疏窗忔憎兒小小池塘高低疊障緑水邊傍却有些風有些月有些涼日用家常木几藤床據眼前水色山光客來無酒清話何妨但細烹荼熱烘盞淺澆湯其四淨掃塵埃惜取蒼苔任門前紅葉鋪階也堪圖畫還也奇哉有數株松數竿竹數枝梅花木栽培取次教開明朝事天自安排知他富貴幾時來我且優遊且隨分過且寬懷輥金丸楊真人一更裏擒意馬猿猴兒莫顛耍大悟來心地覺清涼管自然都放下本來面目常瀟灑真清淨更幽雅更減口頤養氣神全按四時分造化其二二更裏夫婦會和嬰兒姹女交泰復宇宙顛倒任循環把坎離相匹配土牛木馬撼山海隨羊運搬載潑焰都輥入泥丸教鬼神須驚駭其三三更裏根蒂固玲瓏現日端午要返覆泥裏倒推車便即時揚勃土木金間隔騰烏兔刀圭至汞鉛聚降滿地白雪注黃芽看玉華金蓮朵朵其四四更裏法鼓響金雞兒木頭唱便斡旋升降透雙關早起隨明堂過虎龍自在通來往能抽添運水火鍊黑赤爐內輥金丸迸雪白硃砂顆其五五更裏天欲曉功圓滿行都了便脫殼來往有無間顯出真容貌古今快樂仙家延長生永無老降紫詔傳報玉皇宣駕祥雲歸蓬島兩隻鴈兒馬丹陽一更裏要精專安間靜坐眼看猿猴耍莫放顛先須減睡眠眠心散露青天恆沙功滿大千工夫要行功圓非干是自然其二二更裏二氣運鉛消汞焰煎鉛是汞汞成鉛沖和滿洞天沖和氣任虛源九曲明珠串雙闕透射碧天元來是自然其三三更裏月正圓笙歌消夜天金童喜玉女歡凡間不一般長生酒醉不顛飲了還少年曲江上望懸懸酤買不用錢其四四更裏徹玲瓏玲瓏徹碧天登彼岸跨鳳鸞辛苦三二年言非大莫虛傳傳了無一言猿是馬馬是猿休教付兩邊其五五更裏畫角喧驚回清夢遊仙眠是夢夢是眠方知心是天天生地地生天一氣合混元添一歲減一年真空不動然步步嬌范真人住在古窑墓行坐立歌舞捉住這真空猛悟自古及今説龍虎無一無一箇人悟其二傳得一口訣教我去栽接自從栽接後全别玉蘂金花果結子啞子喫餳蜜難説其三柔弱好家風大道不脫空真箇真箇有鉛汞水火既濟上下沖文武兩交戰齊功其四真行與真功刀圭快如風不遇真師匠難明你若做時第一功渾身百關節齊通其五俺在炕上坐唱箇囉哩囉困來睡一覺如何俺把隂陽顛倒過俺笑俺笑你空坐其六貧子喫好酒喫得酩酊休萬事都不挂心頭仁毁任謗落一籌癡聾喑啞漢真修其七無為自然道清淨長芝草默默相知了便好杳杳冥冥閉了竈工夫片時間成了其八休執性為真如何出陽神十箇九箇守頑空若得命基帶了性白麵做燒餅有準其九遍地有靈芝人人都不識作得業又大難敵我今欲待説與你只恐你不信談非其十信則你自信不信你休行莫待臨渴時掘井每日見爾費苦辛不濟不濟事休論挂金索我愛間居心鏡常皎潔境滅情忘自然無分别雲散長空露出清霄月此箇家風有口難分説其二一更裏澄心下手端然坐趕退群魔隊隊白羊過剔起心燈照見元初我方寸玲瓏寶珠懸一顆其三二更裏人靜萬事都無染一對金蟾上下來盤旋嚇退三尸奔走如雷電白雪漫漫降下璚花片其四三更裏陽生子母朝金闕海底靈龜吸盡金烏血一氣綿綿三關都透徹萬道霞光捧出西江月其五四更裏無事四邊都寧靜內放心花賞玩長春景戊己門開有箇真人進一粒金丹運上崑崙頂其六五更裏天明還了修行願龍虎相交倒把黃河捲半空裏雷聲鬼神難測辨認得元初本來真頭面其七齋罷間行獨唱無人和山裏樵夫也唱哩㖮囉上了一箇坡下了一箇坡便做高官也只不如我其八過了一年又是添一歲每日隨緣爭甚間和氣可憐韶華奔走如撚指莫待臨頭臘月三十日其九奉勸人人一一聽分訴不曉隂陽怎知修行路始初下手鍊就鉛汞體自有龜蛇引入曹溪路其十聰明君子一一聽分訴甲子天年看看降真數跳出凡籠一箇長生路免教閻王鬼使來勾取挂金索馬丹陽一更裏端坐慢慢調龍虎運轉三關透入泥丸去龍蟠金鼎虎繞黃庭户這些兒工夫等間休分付其二二更裏二點隂陽真氣妙上下三關休教差錯了姹女嬰兒兩箇都放嬌金公黃婆自然匹配了其三三更裏明月正把乾坤照嚇得邪魔千里不見了退盡隂兵不用刀圭妙海底龜蛇自然相盤繞其四四更裏無事好把真經看句句幽玄説道教修鍊不用水火不用柴和炭鍊就靈丹萬兩金不换其五五更裏天曉架上金雞叫有箇忙兒拍手呵呵笑放飽牛兒快活睡一覺行滿功成自有丹書詔繡薄眉孫仙姑勸人悟修行脫免三塗苦明放著跳出門户談馬丘劉孫王郝太古法海慈航寰中普度其二化愚魯拋離火院夫兒女憑慧劎斬斷三塗人我山崩是非海已枯舊業消除新殃不做其三應仙舉汞鉛黑白希夷路端的下苦志工夫晝夜無眠粗衣淡飯足乞化街頭十方父母其四無憂慮孤雲野鶴無拘束草庵內間看金書窗外林泉隈山傍水竹明月清風堪為伴侣其五養元初心猿意馬牢拴住六賊盡不曾貪圖杳杳冥冥昏昏默默處湛湛澄澄性停命住其六認真趣木金間隔通玄路軀四象五行圓聚氣結神凝隂陽自返復遍體薰蒸周天火足其七破昏衢地雷震動山頭雨黃芽長白雪飛舞露灑璚漿瑞草滿園圃玉蘂紛紛金花綻吐其八境堪圖翶翔雲水縱橫步曲江上飛烏走兔虎繞龍蟠坎離相會聚斡轉天關運動地軸其九法輪鼓河車穩穩三十輻搬日月輥入金爐玉鼎烹煎九陽真火煮萬道霞光千重翠霧其十罩明珠化生養就胎仙舞真慶會姹女圓聚渴飲璚漿玉琴自然撫韻定仙音敲金擊玉十一有中無無中更有些兒做有無中裏面搜取無內藏真有內却如無有無雙忘還同太虛十二行功足蓬萊三島群仙聚瑤池會聖賢無數盡是修真學道列仙侣侍奉高真西王聖母十三享天厨仙衣挂體身輕舉乘鸞鳳玩賞清都寶殿璚樓金釘滿朱户不夜長春無來無去梧葉兒調觀白鷺看烏鴉水底摸魚蝦鶯穿柳蝶戀花景幽雅若非雲門莫誇其二想林濟大慈悲究竟作根基打一棒去片皮好呆癡痛癢猶然不知其三龜毛拂兔角錐蝦蟆撲天飛泥牛吼木馬嘶少人知俯仰泄漏天機其四麥有麵粟有米布袴裏更有腿山有石海有水語真實洞霞無極立基其五擒意馬鎖心猿神氣養交全非扭捏合自然體幽玄法眼超過大千其六玄妙塞化城關一腳蹬翻花紅處柳緑間沒遮攔處處仙佛面顔其七天邊月月正圓掘地去尋天有無有顛倒顛妙玄玄正道須當要口傳其八天邊月月上絃卯酉不虛傳八兩汞八兩鉛一斤全照破了三千及大千其九天邊月月應弓真道妙無窮龍擒虎虎擒龍兩相逢結一朵金花弄風其十天邊月月正南前後各三三離是女坎是男妙玄談不説破教人家怎參十一天邊月月應爐鉛汞鼎中居金憑火鍊就珠一胡蘆三百八十四銖滿庭芳石火光隂人身不久算來生死難防忽生或滅恰似電爭光識破形骸假合尋得箇出世仙方思量後回心向道要認箇法中王時時常見面同行同坐同飲霞漿同伴清風明月同一志同見天光同相會同師訪道同唱滿庭芳鳴鶴餘音卷之六
